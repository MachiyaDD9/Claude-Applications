<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJJ English Guide - 柔術英会話ガイド</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#222638;--card-hover:#2a2e44;
  --accent:#e8443a;--accent-light:#ff6b5e;--accent-dark:#b8342c;
  --text:#e8e8ed;--text-muted:#8b8fa3;--text-dim:#555a6e;
  --border:#2e3247;--green:#34c759;--blue:#5ac8fa;--yellow:#ffd60a;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#1a1d27 0%,#2a1a1a 100%);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff}
.logo h1{font-size:1.25rem;font-weight:700;letter-spacing:.5px}
.logo h1 span{color:var(--accent-light);font-weight:400;font-size:.85rem;margin-left:8px}
.header-controls{display:flex;align-items:center;gap:12px}
.mode-toggle{display:flex;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.mode-btn{padding:8px 16px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:.85rem;transition:.2s}
.mode-btn.active{background:var(--accent);color:#fff}
.progress-badge{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.progress-badge .num{color:var(--green);font-weight:700}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:20px 24px;display:flex;gap:24px;min-height:calc(100vh - 80px)}
.sidebar{width:260px;flex-shrink:0;position:sticky;top:96px;align-self:flex-start;max-height:calc(100vh - 116px);overflow-y:auto}
.main{flex:1;min-width:0}

/* Sidebar */
.nav-list{display:flex;flex-direction:column;gap:4px}
.nav-item{padding:10px 14px;border-radius:var(--radius);cursor:pointer;transition:.2s;border:1px solid transparent;display:flex;align-items:center;gap:10px;font-size:.88rem}
.nav-item:hover{background:var(--card);border-color:var(--border)}
.nav-item.active{background:var(--card);border-color:var(--accent);color:var(--accent-light)}
.nav-item .nav-num{width:24px;height:24px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
.nav-item.active .nav-num{background:var(--accent);color:#fff}
.nav-item .nav-label{flex:1}
.nav-item .nav-count{font-size:.75rem;color:var(--text-dim)}
.nav-item .nav-check{color:var(--green);font-size:.8rem;display:none}
.nav-item.completed .nav-check{display:inline}

/* Section Header */
.section-header{margin-bottom:24px}
.section-header h2{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.section-header .subtitle{color:var(--text-muted);font-size:.9rem}
.section-header .section-desc{color:var(--text-dim);font-size:.85rem;margin-top:8px;line-height:1.7}

/* Cards - Study Mode */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.card.revealed{border-color:var(--green)}
.card .card-term{font-size:1.1rem;font-weight:700;color:var(--accent-light);margin-bottom:6px}
.card .card-hint{font-size:.8rem;color:var(--text-dim);margin-bottom:12px}
.card .card-answer{max-height:0;overflow:hidden;transition:max-height .4s ease;opacity:0}
.card.revealed .card-answer{max-height:600px;opacity:1;transition:max-height .4s ease,opacity .3s .1s}
.card .card-meaning{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:8px;padding-top:12px;border-top:1px solid var(--border)}
.card .card-detail{font-size:.85rem;color:var(--text-muted);line-height:1.7}
.card .card-tap{position:absolute;bottom:12px;right:16px;font-size:.7rem;color:var(--text-dim);transition:.2s}
.card.revealed .card-tap{opacity:0}
.card .card-check{position:absolute;top:12px;right:14px;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:.2s}
.card.learned .card-check{border-color:var(--green);background:var(--green);color:#fff}

/* Table - Reference Mode */
.ref-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.ref-table th{background:var(--surface);padding:12px 16px;text-align:left;font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.ref-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.88rem;vertical-align:top}
.ref-table tr:last-child td{border-bottom:none}
.ref-table tr:hover td{background:var(--card-hover)}
.ref-table .col-term{font-weight:700;color:var(--accent-light);min-width:160px}
.ref-table .col-meaning{color:var(--text);min-width:140px}
.ref-table .col-detail{color:var(--text-muted);font-size:.83rem;line-height:1.6}

/* Long text cards */
.long-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;cursor:pointer;transition:.2s}
.long-card:hover{border-color:var(--accent)}
.long-card.revealed{border-color:var(--green)}
.long-card .lc-title{font-size:1.05rem;font-weight:700;color:var(--accent-light);margin-bottom:4px}
.long-card .lc-sub{font-size:.85rem;color:var(--text-muted);margin-bottom:10px}
.long-card .lc-en{background:var(--surface);border-radius:8px;padding:14px 16px;font-size:.88rem;color:var(--blue);line-height:1.7;margin-bottom:10px;border-left:3px solid var(--accent)}
.long-card .lc-jp{max-height:0;overflow:hidden;opacity:0;transition:max-height .4s ease,opacity .3s .1s}
.long-card.revealed .lc-jp{max-height:400px;opacity:1}
.long-card .lc-jp-inner{background:var(--surface);border-radius:8px;padding:14px 16px;font-size:.85rem;color:var(--text-muted);line-height:1.7;border-left:3px solid var(--green);margin-top:8px}
.long-card .lc-tap{font-size:.7rem;color:var(--text-dim);text-align:right;margin-top:8px}
.long-card.revealed .lc-tap{opacity:0}

/* Search */
.search-bar{margin-bottom:20px}
.search-bar input{width:100%;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9rem;outline:none;transition:.2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--text-dim)}

/* Stats Bar */
.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.stat .stat-val{font-weight:700;font-size:1rem}
.stat.red .stat-val{color:var(--accent-light)}
.stat.green .stat-val{color:var(--green)}
.stat.blue .stat-val{color:var(--blue)}

/* Reset button */
.reset-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.78rem;transition:.2s}
.reset-btn:hover{border-color:var(--accent);color:var(--accent-light)}

/* Speech button */
.speak-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);width:32px;height:32px;border-radius:50%;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0;font-size:1rem;line-height:1;padding:0}
.speak-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(90,200,250,.1)}
.speak-btn.speaking{border-color:var(--accent-light);color:var(--accent-light);background:rgba(232,68,58,.15);animation:pulse-speak 1s ease-in-out infinite}
@keyframes pulse-speak{0%,100%{opacity:1}50%{opacity:.5}}
.speak-btn svg{width:16px;height:16px;fill:currentColor}
.card-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-top-row .card-term{flex:1}
.lc-en-row{display:flex;align-items:flex-start;gap:8px}
.lc-en-row .lc-en{flex:1}
.ref-speak{vertical-align:middle;margin-left:4px}

/* Mobile */
@media(max-width:900px){
  .container{flex-direction:column}
  .sidebar{width:100%;position:static;max-height:none;overflow:visible}
  .nav-list{flex-direction:row;flex-wrap:wrap;gap:6px}
  .nav-item{padding:8px 12px;font-size:.8rem}
  .nav-item .nav-label{display:none}
  .nav-item .nav-num{width:28px;height:28px;font-size:.75rem}
  .nav-item .nav-count{display:none}
  .cards-grid{grid-template-columns:1fr}
  .header-inner{flex-direction:column;align-items:flex-start}
}
@media(max-width:600px){
  .container{padding:12px}
  .header{padding:12px 16px}
  .ref-table{font-size:.82rem}
  .ref-table th,.ref-table td{padding:8px 10px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">柔</div>
      <h1>BJJ English Guide<span>柔術英会話ガイド</span></h1>
    </div>
    <div class="header-controls">
      <div class="progress-badge">
        学習済: <span class="num" id="globalProgress">0</span> / <span id="globalTotal">0</span>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="study" onclick="setMode('study')">学習モード</button>
        <button class="mode-btn" data-mode="ref" onclick="setMode('ref')">一覧モード</button>
      </div>
      <button class="reset-btn" onclick="resetProgress()">リセット</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <nav class="nav-list" id="navList"></nav>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
const DATA = [
  {
    id:'vocab',title:'基本語彙',subtitle:'Basic BJJ Vocabulary',
    desc:'柔術コミュニティで日常的に使われる基本用語。日本語やポルトガル語からの借用語も多く含まれる。',
    type:'term',
    items:[
      {term:'Oss (Osu)',meaning:'了解、こんにちは、ありがとう',detail:'BJJにおいて最も汎用性の高い言葉。挨拶、同意、敬意の表明、または困難に耐える精神を示す言葉として用いられる。'},
      {term:'Gi / No-Gi',meaning:'道着（ギ）/ ノーギ',detail:'日本語の「稽古着」に由来する。Kimonoと呼ばれることもあるが、Giが定着している。No-Giはラッシュガード等で行う練習を指す。'},
      {term:'Mat',meaning:'マット、畳',detail:'練習を行う領域。神聖な場所とされ、マットに上がる際、降りる際はお辞儀をするのが普遍的なエチケット。'},
      {term:'Professor / Coach',meaning:'先生、インストラクター',detail:'黒帯の指導者をProfessor、それ以下の帯の指導者をCoachと呼ぶことが一般的。'},
      {term:'Roll / Rolling',meaning:'スパーリング',detail:'BJJにおける実戦形式の練習。単なる「Fight」ではなく、技術を試し合う流動的なプロセスを指す。'},
      {term:'Drill',meaning:'打ち込み、反復練習',detail:'筋肉の記憶（マッスルメモリー）を構築するために、特定の技術を何度も反復する練習プロセス。'},
      {term:'Creonte',meaning:'裏切り者',detail:'カーウソン・グレイシーがギリシャ神話にちなんで名付けた古いスラング。道場を頻繁に移籍する者を指す。'},
      {term:'Porrada',meaning:'激しい練習、全力でのスパー',detail:'ポルトガル語で「殴り合い」を意味するが、BJJでは全力を尽くしてハードに練習する姿勢を指す。'}
    ]
  },
  {
    id:'greetings',title:'挨拶・エチケット',subtitle:'Greetings & Etiquette',
    desc:'ゲストが道場に到着した際の初期対応。歓迎、施設案内、衛生管理に関する表現。',
    type:'phrase',
    items:[
      {term:'歓迎と確認',en:'"Welcome to our academy. Are you dropping in for today\'s class?"',meaning:'アカデミーへの歓迎の意を示し、本日のクラスへのドロップイン（出稽古）であるかを確認する。'},
      {term:'経歴の確認',en:'"Where do you usually train, and what belt are you?"',meaning:'相手の所属と帯色を確認し、スパーリングのペアリングや指導のレベルを調整する。'},
      {term:'事務手続き',en:'"Please sign the waiver here."',meaning:'免責同意書（Waiver）への署名を促す。法的なリスク管理として必須の表現。'},
      {term:'施設案内',en:'"The changing room and restrooms are over there."',meaning:'更衣室とトイレの場所を案内する。'},
      {term:'エチケット',en:'"Please bow before stepping on or off the mat."',meaning:'マットへの出入り時にお辞儀をするという、BJJの伝統的な敬意の作法を伝える。'},
      {term:'衛生管理',en:'"Please wear footwear when off the mats to prevent infections."',meaning:'感染症予防のため、マット外での履物着用を義務付ける。'},
      {term:'身だしなみ',en:'"Make sure your finger and toe nails are trimmed short."',meaning:'爪が長いと相手を傷つけるため、短く切るよう促す。安全管理の基本。'}
    ]
  },
  {
    id:'body',title:'身体部位',subtitle:'Anatomical Body Parts',
    desc:'技の説明において、関節や骨の正確な位置を指示するための身体部位の英単語。',
    type:'term',
    items:[
      {term:'Head / Forehead',meaning:'頭 / 額',detail:''},
      {term:'Neck / Throat',meaning:'首 / 喉、気管',detail:''},
      {term:'Shoulder',meaning:'肩',detail:''},
      {term:'Shoulder Blade (Scapula)',meaning:'肩甲骨',detail:''},
      {term:'Armpit',meaning:'脇の下',detail:''},
      {term:'Chest / Ribs',meaning:'胸 / 肋骨',detail:''},
      {term:'Belly / Torso',meaning:'腹 / 胴体',detail:''},
      {term:'Back / Spine',meaning:'背中 / 脊椎',detail:''},
      {term:'Arm / Forearm',meaning:'腕 / 前腕',detail:''},
      {term:'Elbow / Bicep',meaning:'肘 / 上腕二頭筋',detail:''},
      {term:'Wrist / Hand',meaning:'手首 / 手',detail:''},
      {term:'Fingers / Thumb',meaning:'指 / 親指',detail:''},
      {term:'Hips / Pelvis',meaning:'股関節、腰 / 骨盤',detail:''},
      {term:'Thigh / Hamstring',meaning:'太もも / ハムストリング',detail:''},
      {term:'Knee / Shin',meaning:'膝 / 脛（すね）',detail:''},
      {term:'Calf',meaning:'ふくらはぎ',detail:''},
      {term:'Ankle / Heel',meaning:'足首 / 踵（かかと）',detail:''},
      {term:'Foot / Toes',meaning:'足 / 足の指',detail:''},
      {term:'Joint / Ligament',meaning:'関節 / 靭帯',detail:''},
      {term:'Instep (Laces)',meaning:'足の甲',detail:''}
    ]
  },
  {
    id:'injuries',title:'怪我・コンディション',subtitle:'Injuries & Conditions',
    desc:'スパーリング前に自身の怪我や疲労状態を共有し、事故を未然に防ぐための表現。',
    type:'phrase',
    items:[
      {term:'怪我の申告',en:'"I have a slight injury on my right shoulder, so please go easy on that side."',meaning:'右肩を痛めているため、そちら側への攻撃は手加減してほしい旨を伝える。'},
      {term:'関節の不安',en:'"My left knee is a bit tweaked, so I might tap early to leg locks."',meaning:'左膝に違和感があるため、足関節技には早めにタップすることを事前告知する。'},
      {term:'スタミナの欠如',en:'"I\'m feeling gassed today."',meaning:'「Gassed」はスタミナ切れ（ガス欠）を意味するスラング。疲労困憊であることを伝える。'},
      {term:'特有の症状',en:'Cauliflower ear / Staph infection / Ringworm',meaning:'湧き耳 / ブドウ球菌感染 / 白癬・水虫。BJJで発症しやすい外傷や皮膚感染症。これらがある場合は練習への参加を控えるべき。'}
    ]
  },
  {
    id:'class',title:'クラス進行',subtitle:'Class Management & Drills',
    desc:'ウォームアップ、マット運動、ドリルの進行とパートナーワークの管理に使う指示表現。',
    type:'phrase',
    items:[
      {term:'開始の合図',en:'"Let\'s start with the warm-up. Jog in a circle."',meaning:'ウォームアップを始めましょう。円になってジョギングしてください。'},
      {term:'マット運動',en:'"Forward rolls and backward rolls down the mat."',meaning:'マットの端まで前転と後転を行ってください。'},
      {term:'受け身',en:'"Breakfalls. Tuck your chin to protect your head."',meaning:'受け身。頭を守るために顎を引いてください。'},
      {term:'エビ（ヒップエスケープ）',en:'"Shrimping (Hip escapes). Plant your feet and move your hips away."',meaning:'エビ。足を床につき、腰を遠ざけるように動かしてください。'},
      {term:'その他の動作',en:'"Bear crawls and sprawls."',meaning:'ベアクロールとスプロール。'},
      {term:'ペアの結成',en:'"Partner up." / "Grab a partner."',meaning:'参加者にペアを組むよう促す標準的な表現。'},
      {term:'役割の指定',en:'"One person on top, one person on the bottom."',meaning:'どちらが上のポジション（トップ）、どちらが下のポジション（ボトム）をとるかを指定する。'},
      {term:'受け手の態度',en:'"Uke, please provide a realistic but cooperative reaction."',meaning:'技を受ける側（Uke）に対し、完全に力を抜く（limp noodle）のではなく、適度な抵抗を保ちつつ協力するよう指示する。'},
      {term:'反復と交代',en:'"Let\'s do three reps each, then switch."',meaning:'それぞれ3回ずつ反復（reps）し、その後役割を交代（switch）するよう指示する。'},
      {term:'抵抗の追加',en:'"Add a little bit of resistance to check the mechanics."',meaning:'技の構造（メカニクス）を確認するため、受け手に少し抵抗を加えるよう求める。'}

  {
    id:'referee',title:'審判コマンド',subtitle:'Referee Commands',

    id:'biomech',title:'バイオメカニクス',subtitle:'Biomechanics & Body Mechanics',

    type:'long',
    items:[

function stripQuotes(text) {
  return text.replace(/^[""“]+|[""”]+$/g, '').trim();
}

function getEnglishText(item) {
  if (item.en) return stripQuotes(item.en);
  if (item.term) return item.term;
  return '';
}

function speak(e, text) {
  e.stopPropagation();
  const clean = stripQuotes(text);
  if (!clean) return;
  window.speechSynthesis.cancel();
  const btn = e.currentTarget;
  document.querySelectorAll('.speak-btn.speaking').forEach(b => b.classList.remove('speaking'));
  btn.classList.add('speaking');
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google'))
    || voices.find(v => v.lang.startsWith('en-US'))
    || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utter.voice = enVoice;
  utter.onend = () => btn.classList.remove('speaking');
  utter.onerror = () => btn.classList.remove('speaking');
  window.speechSynthesis.speak(utter);
}

window.speechSynthesis.getVoices();

function getTotalItems(){return DATA.reduce((s,c)=>s+c.items.length,0)}
function getLearnedCount(){return Object.keys(learned).length}
function itemKey(catId,idx){return catId+'_'+idx}

function updateGlobalProgress(){
  document.getElementById('globalProgress').textContent=getLearnedCount();
  document.getElementById('globalTotal').textContent=getTotalItems();
}

function saveLearned(){
  localStorage.setItem('bjj_learned',JSON.stringify(learned));
  updateGlobalProgress();
  renderNav();
}

function resetProgress(){
  if(!confirm('学習済みの記録をすべてリセットしますか？'))return;
  learned={};saveLearned();render();
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.mode===m);
  });
  render();
}

function renderNav(){
  const nav=document.getElementById('navList');
  nav.innerHTML=DATA.map((cat,i)=>{
    const total=cat.items.length;
    const done=cat.items.filter((_,j)=>learned[itemKey(cat.id,j)]).length;
    const completed=done===total;
    return `<div class="nav-item ${cat.id===currentCategory?'active':''} ${completed?'completed':''}" onclick="selectCategory('${cat.id}')">
      <span class="nav-num">${i+1}</span>
      <span class="nav-label">${cat.title}</span>
      <span class="nav-count">${done}/${total}</span>
      <span class="nav-check">&#10003;</span>
    </div>`;
  }).join('');
}

function selectCategory(id){
  currentCategory=id;render();
}

function toggleCard(catId,idx){
  const el=document.getElementById('card-'+catId+'-'+idx);
  if(!el)return;
  el.classList.toggle('revealed');
}

function toggleLearned(e,catId,idx){
  e.stopPropagation();
  const key=itemKey(catId,idx);
  if(learned[key])delete learned[key];else learned[key]=1;
  saveLearned();
  const card=document.getElementById('card-'+catId+'-'+idx);
  if(card)card.classList.toggle('learned',!!learned[key]);
}

function render(){
  renderNav();
  const cat=DATA.find(c=>c.id===currentCategory);
  if(!cat)return;

  const main=document.getElementById('mainContent');
  const catDone=cat.items.filter((_,j)=>learned[itemKey(cat.id,j)]).length;

  let html=`<div class="section-header">
    <h2>${cat.title} <span style="font-weight:400;color:var(--text-muted);font-size:1rem">${cat.subtitle}</span></h2>
    <div class="section-desc">${cat.desc}</div>
  </div>`;

  html+=`<div class="stats-bar">
    <div class="stat blue"><span class="stat-val">${cat.items.length}</span> 項目</div>
    <div class="stat green"><span class="stat-val">${catDone}</span> 学習済</div>
    <div class="stat red"><span class="stat-val">${cat.items.length-catDone}</span> 未学習</div>
  </div>`;

  html+=`<div class="search-bar"><input type="text" placeholder="このカテゴリ内を検索..." oninput="filterItems(this.value)"></div>`;

  if(mode==='study'){
    html+=renderStudyMode(cat);
  }else{
    html+=renderRefMode(cat);
  }

  main.innerHTML=html;
  updateGlobalProgress();
}

function renderStudyMode(cat){
  if(cat.type==='long'){
    return cat.items.map((item,i)=>{
      const key=itemKey(cat.id,i);
      const isLearned=!!learned[key];
      const speakText = stripQuotes(item.en);
      return `<div class="long-card ${isLearned?'learned':''}" id="card-${cat.id}-${i}" onclick="toggleCard('${cat.id}',${i})" data-search="${(item.title+item.sub+item.en+item.jp).toLowerCase()}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="lc-title">${item.title}</div>
            <div class="lc-sub">${item.sub}</div>
          </div>
          <div class="card-check" onclick="toggleLearned(event,'${cat.id}',${i})" title="学習済みにする">${isLearned?'&#10003;':''}</div>
        </div>
        <div class="lc-en-row">
          <div class="lc-en">${item.en}</div>
          <button class="speak-btn" onclick="speak(event,\`${speakText.replace(/`/g,"'")}\`)" title="読み上げ" style="margin-top:12px">${SPEAK_SVG}</button>
        </div>
        <div class="lc-jp"><div class="lc-jp-inner">${item.jp}</div></div>
        <div class="lc-tap">&#9650; クリックで日本語訳を表示</div>
      </div>`;
    }).join('');
  }

  let html=`<div class="cards-grid">`;
  cat.items.forEach((item,i)=>{
    const key=itemKey(cat.id,i);
    const isLearned=!!learned[key];
    const hasEn=item.en;
    const speakText = getEnglishText(item);
    html+=`<div class="card ${isLearned?'learned':''}" id="card-${cat.id}-${i}" onclick="toggleCard('${cat.id}',${i})" data-search="${((item.term||'')+(item.en||'')+(item.meaning||'')+(item.detail||'')).toLowerCase()}">
      <div class="card-check" onclick="toggleLearned(event,'${cat.id}',${i})" title="学習済みにする">${isLearned?'&#10003;':''}</div>
      <div class="card-top-row">
        <div class="card-term">${item.term}</div>
        ${speakText?`<button class="speak-btn" onclick="speak(event,\`${speakText.replace(/`/g,"'")}\`)" title="読み上げ">${SPEAK_SVG}</button>`:''}
      </div>
      ${hasEn?`<div class="card-hint" style="color:var(--blue);font-size:.88rem;line-height:1.5">${item.en}</div>`:''}
      <div class="card-answer">
        <div class="card-meaning">${item.meaning}</div>
        ${item.detail?`<div class="card-detail">${item.detail}</div>`:''}
      </div>
      <div class="card-tap">&#9650; クリックで表示</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function renderRefMode(cat){
  if(cat.type==='long'){
    let html=`<div style="overflow-x:auto"><table class="ref-table">
      <thead><tr><th>技術・概念</th><th>英語表現</th><th style="width:40px"></th><th>日本語解説</th></tr></thead><tbody>`;
    cat.items.forEach(item=>{
      const st=stripQuotes(item.en);
      html+=`<tr><td class="col-term">${item.title}<br><span style="font-weight:400;color:var(--text-dim);font-size:.78rem">${item.sub}</span></td>
        <td class="col-detail" style="color:var(--blue)">${item.en}</td>
        <td><button class="speak-btn ref-speak" onclick="speak(event,\`${st.replace(/`/g,"'")}\`)" title="読み上げ">${SPEAK_SVG}</button></td>
        <td class="col-detail">${item.jp}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
    return html;
  }

  const hasEn=cat.items.some(it=>it.en);
  const hasDetail=cat.items.some(it=>it.detail);

  let html=`<div style="overflow-x:auto"><table class="ref-table"><thead><tr>
    <th>${cat.type==='phrase'?'状況・目的':'英語用語'}</th>
    ${hasEn?'<th>英語表現</th>':''}
    <th style="width:40px"></th>
    <th>意味・ニュアンス</th>
    ${hasDetail?'<th>備考</th>':''}
  </tr></thead><tbody>`;

  cat.items.forEach(item=>{
    const st=getEnglishText(item);
    html+=`<tr>
      <td class="col-term">${item.term}</td>
      ${hasEn?`<td class="col-detail" style="color:var(--blue)">${item.en||''}</td>`:''}
      <td><button class="speak-btn ref-speak" onclick="speak(event,\`${st.replace(/`/g,"'")}\`)" title="読み上げ">${SPEAK_SVG}</button></td>
      <td class="col-meaning">${item.meaning}</td>
      ${hasDetail?`<td class="col-detail">${item.detail||''}</td>`:''}
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function filterItems(query){
  const q=query.toLowerCase().trim();
  document.querySelectorAll('[data-search]').forEach(el=>{
    el.style.display=!q||el.dataset.search.includes(q)?'':'none';
  });
  document.querySelectorAll('.ref-table tbody tr').forEach(tr=>{
    const text=tr.textContent.toLowerCase();
    tr.style.display=!q||text.includes(q)?'':'none';
  });
}

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="description" content="BJJ (ブラジリアン柔術) で使う英会話を学ぶためのガイドアプリ">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>BJJ English Guide - 柔術英会話ガイド</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#222638;--card-hover:#2a2e44;
  --accent:#e8443a;--accent-light:#ff6b5e;--accent-dark:#b8342c;
  --text:#e8e8ed;--text-muted:#8b8fa3;--text-dim:#555a6e;
  --border:#2e3247;--green:#34c759;--blue:#5ac8fa;--yellow:#ffd60a;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1d27 0%,#2a1a1a 100%);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff}
.logo h1{font-size:1.25rem;font-weight:700;letter-spacing:.5px}
.logo h1 span{color:var(--accent-light);font-weight:400;font-size:.85rem;margin-left:8px}
.header-controls{display:flex;align-items:center;gap:12px}
.mode-toggle{display:flex;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.mode-btn{padding:8px 16px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:.85rem;transition:.2s}
.mode-btn.active{background:var(--accent);color:#fff}
.progress-badge{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.progress-badge .num{color:var(--green);font-weight:700}
.container{max-width:1200px;margin:0 auto;padding:20px 24px;display:flex;gap:24px;min-height:calc(100vh - 80px)}
.sidebar{width:260px;flex-shrink:0;position:sticky;top:96px;align-self:flex-start;max-height:calc(100vh - 116px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sidebar::-webkit-scrollbar{width:5px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}
.main{flex:1;min-width:0}
.nav-list{display:flex;flex-direction:column;gap:4px}
.nav-item{padding:10px 14px;border-radius:var(--radius);cursor:pointer;transition:.2s;border:1px solid transparent;display:flex;align-items:center;gap:10px;font-size:.88rem}
.nav-item:hover{background:var(--card);border-color:var(--border)}
.nav-item.active{background:var(--card);border-color:var(--accent);color:var(--accent-light)}
.nav-item .nav-num{width:24px;height:24px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
.nav-item.active .nav-num{background:var(--accent);color:#fff}
.nav-item .nav-label{flex:1}
.nav-item .nav-count{font-size:.75rem;color:var(--text-dim)}
.nav-item .nav-check{color:var(--green);font-size:.8rem;display:none}
.nav-item.completed .nav-check{display:inline}
.section-header{margin-bottom:24px}
.section-header h2{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.section-header .subtitle{color:var(--text-muted);font-size:.9rem}
.section-header .section-desc{color:var(--text-dim);font-size:.85rem;margin-top:8px;line-height:1.7}
.item-illust{display:flex;justify-content:center;margin:12px 0;padding:14px;background:var(--surface);border-radius:10px;border:1px solid var(--border)}
.item-illust svg{max-width:100%;max-height:220px;height:auto}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;align-items:start}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.card.revealed{border-color:var(--green)}
.card .card-term{font-size:1.1rem;font-weight:700;color:var(--accent-light);margin-bottom:6px}
.card .card-hint{font-size:.8rem;color:var(--text-dim);margin-bottom:12px}
.card .card-answer{max-height:0;overflow:hidden;transition:max-height .5s ease;opacity:0}
.card.revealed .card-answer{max-height:1200px;opacity:1;transition:max-height .5s ease,opacity .3s .1s}
.card .card-meaning{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:8px;padding-top:12px;border-top:1px solid var(--border)}
.card .card-detail{font-size:.85rem;color:var(--text-muted);line-height:1.7}
.card .card-tap{position:absolute;bottom:12px;right:16px;font-size:.7rem;color:var(--text-dim);transition:.2s}
.card.revealed .card-tap{opacity:0}
.card .card-check{position:absolute;top:12px;right:14px;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:.2s}
.card.learned .card-check{border-color:var(--green);background:var(--green);color:#fff}
.ref-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.ref-table th{background:var(--surface);padding:12px 16px;text-align:left;font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.ref-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.88rem;vertical-align:top}
.ref-table tr:last-child td{border-bottom:none}
.ref-table tr:hover td{background:var(--card-hover)}
.ref-table .col-term{font-weight:700;color:var(--accent-light);min-width:160px}
.ref-table .col-meaning{color:var(--text);min-width:140px}
.ref-table .col-detail{color:var(--text-muted);font-size:.83rem;line-height:1.6}
.long-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;cursor:pointer;transition:.2s}
.long-card:hover{border-color:var(--accent)}
.long-card.revealed{border-color:var(--green)}
.long-card .lc-title{font-size:1.05rem;font-weight:700;color:var(--accent-light);margin-bottom:4px}
.long-card .lc-sub{font-size:.85rem;color:var(--text-muted);margin-bottom:10px}
.long-card .lc-en{background:var(--surface);border-radius:8px;padding:14px 16px;font-size:.88rem;color:var(--blue);line-height:1.7;margin-bottom:10px;border-left:3px solid var(--accent)}
.long-card .lc-jp{max-height:0;overflow:hidden;opacity:0;transition:max-height .5s ease,opacity .3s .1s}
.long-card.revealed .lc-jp{max-height:1200px;opacity:1}
.long-card .lc-jp-inner{background:var(--surface);border-radius:8px;padding:14px 16px;font-size:.85rem;color:var(--text-muted);line-height:1.7;border-left:3px solid var(--green);margin-top:8px}
.long-card .lc-tap{font-size:.7rem;color:var(--text-dim);text-align:right;margin-top:8px}
.long-card.revealed .lc-tap{opacity:0}
.story-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.story-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.story-title{font-size:1.15rem;font-weight:700;color:var(--accent-light)}
.story-desc{font-size:.85rem;color:var(--text-muted);margin:4px 0 14px}
.story-play{background:var(--accent);border:none;color:#fff;padding:10px 22px;border-radius:24px;cursor:pointer;font-size:.9rem;font-weight:600;transition:.2s;flex-shrink:0}
.story-play:hover{background:var(--accent-dark)}
.story-play.playing{background:var(--green)}
.story-lines{margin-top:8px}
.story-line{display:flex;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:.2s;border-left:3px solid transparent;margin-bottom:2px;align-items:flex-start}
.story-line:hover{background:var(--card-hover)}
.story-line.now{background:var(--surface);border-left-color:var(--yellow)}
.story-sp{flex-shrink:0;min-width:44px;padding:3px 8px;border-radius:6px;font-size:.7rem;font-weight:700;text-align:center;margin-top:2px}
.story-sp.A{background:rgba(37,99,184,.3);color:var(--blue)}
.story-sp.B{background:rgba(196,58,50,.3);color:var(--accent-light)}
.story-sp.N{background:var(--border);color:var(--text-muted)}
.story-sp.C{background:rgba(52,199,89,.25);color:var(--green)}
.story-all-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.story-play.secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.story-play.secondary:hover{border-color:var(--accent);background:var(--card-hover)}
.story-play.secondary.playing{background:var(--green);border-color:var(--green);color:#fff}
.story-en{font-size:.9rem;color:var(--text);line-height:1.55}
.story-jp{font-size:.78rem;color:var(--text-dim);line-height:1.55;margin-top:2px}
.story-hint{font-size:.75rem;color:var(--text-dim);margin-bottom:16px}
.search-bar{margin-bottom:20px}
.search-bar input{width:100%;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9rem;outline:none;transition:.2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--text-dim)}
.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.stat .stat-val{font-weight:700;font-size:1rem}
.stat.red .stat-val{color:var(--accent-light)}
.stat.green .stat-val{color:var(--green)}
.stat.blue .stat-val{color:var(--blue)}
.reset-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.78rem;transition:.2s}
.reset-btn:hover{border-color:var(--accent);color:var(--accent-light)}
.speak-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);width:32px;height:32px;border-radius:50%;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0;font-size:1rem;line-height:1;padding:0}
.speak-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(90,200,250,.1)}
.speak-btn.speaking{border-color:var(--accent-light);color:var(--accent-light);background:rgba(232,68,58,.15);animation:pulse-speak 1s ease-in-out infinite}
@keyframes pulse-speak{0%,100%{opacity:1}50%{opacity:.5}}
.speak-btn svg{width:16px;height:16px;fill:currentColor}
.card-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-top-row .card-term{flex:1}
.lc-en-row{display:flex;align-items:flex-start;gap:8px}
.lc-en-row .lc-en{flex:1}
.ref-speak{vertical-align:middle;margin-left:4px}
@media(max-width:900px){
  .container{flex-direction:column}
  .sidebar{width:100%;position:static;max-height:none;overflow:visible}
  .nav-list{flex-direction:row;flex-wrap:wrap;gap:6px}
  .nav-item{padding:8px 12px;font-size:.8rem}
  .nav-item .nav-label{display:none}
  .nav-item .nav-num{width:28px;height:28px;font-size:.75rem}
  .nav-item .nav-count{display:none}
  .cards-grid{grid-template-columns:1fr}
  .header-inner{flex-direction:column;align-items:flex-start}
}
@media(max-width:600px){
  .container{padding:12px}
  .header{padding:12px 16px}
  .ref-table{font-size:.82rem}
  .ref-table th,.ref-table td{padding:8px 10px}
}
</style>
</head>
<body>
<div class="header"><div class="header-inner">
  <div class="logo"><div class="logo-icon">柔</div><h1>BJJ English Guide<span>柔術英会話ガイド</span></h1></div>
  <div class="header-controls">
    <div class="progress-badge">学習済: <span class="num" id="globalProgress">0</span> / <span id="globalTotal">0</span></div>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="study" onclick="setMode('study')">学習モード</button>
      <button class="mode-btn" data-mode="ref" onclick="setMode('ref')">一覧モード</button>
    </div>
    <button class="reset-btn" onclick="resetProgress()">リセット</button>
  </div>
</div></div>
<div class="container">
  <div class="sidebar"><nav class="nav-list" id="navList"></nav></div>
  <div class="main" id="mainContent"></div>
</div>

<script>
// ========================================
//  ILLUSTRATION ENGINE
// ========================================
// Colors
const B1='#2563b8',B2='#4a9eff',R1='#c43a32',R2='#ff6b5e',Y='#ffd60a',G='#34c759',BD='#3a4f60',BL='#5a7080',MAT='#1a2e1a',MATL='#34c759';
// Two-person grappling figure builder (thick pictogram style)
// s=stroke-linecap:round;stroke-linejoin:round;fill:none
const S=` stroke-linecap="round" stroke-linejoin="round" fill="none"`;
function mat(w){return `<rect x="0" y="160" width="${w||320}" height="40" rx="4" fill="${MAT}" opacity=".4"/><line x1="0" y1="160" x2="${w||320}" y2="160" stroke="${MATL}" stroke-width="2" opacity=".3"/>`;}

// ---- Body part highlight template ----
const BODY_REGIONS={
  head:`<ellipse cx="70" cy="28" rx="22" ry="26" fill="${Y}" opacity=".3"/><ellipse cx="70" cy="28" rx="22" ry="26" stroke="${Y}" stroke-width="2.5" fill="none"/>`,
  neck:`<rect x="58" y="52" width="24" height="16" rx="6" fill="${Y}" opacity=".35"/><rect x="58" y="52" width="24" height="16" rx="6" stroke="${Y}" stroke-width="2" fill="none"/>`,
  shoulder:`<ellipse cx="42" cy="78" rx="16" ry="12" fill="${Y}" opacity=".3"/><ellipse cx="98" cy="78" rx="16" ry="12" fill="${Y}" opacity=".3"/><ellipse cx="42" cy="78" rx="16" ry="12" stroke="${Y}" stroke-width="2" fill="none"/><ellipse cx="98" cy="78" rx="16" ry="12" stroke="${Y}" stroke-width="2" fill="none"/>`,
  scapula:`<ellipse cx="50" cy="100" rx="14" ry="18" fill="${Y}" opacity=".25" transform="rotate(-10 50 100)"/><ellipse cx="90" cy="100" rx="14" ry="18" fill="${Y}" opacity=".25" transform="rotate(10 90 100)"/>`,
  armpit:`<circle cx="38" cy="90" r="8" fill="${Y}" opacity=".35"/><circle cx="102" cy="90" r="8" fill="${Y}" opacity=".35"/>`,
  chest:`<ellipse cx="70" cy="100" rx="28" ry="22" fill="${Y}" opacity=".25"/><ellipse cx="70" cy="100" rx="28" ry="22" stroke="${Y}" stroke-width="2" fill="none"/>`,
  belly:`<ellipse cx="70" cy="140" rx="22" ry="20" fill="${Y}" opacity=".25"/><ellipse cx="70" cy="140" rx="22" ry="20" stroke="${Y}" stroke-width="2" fill="none"/>`,
  back:`<rect x="55" y="80" width="30" height="80" rx="8" fill="${Y}" opacity=".2"/><line x1="70" y1="68" x2="70" y2="160" stroke="${Y}" stroke-width="3" stroke-dasharray="5" opacity=".6"/>`,
  arm:`<path d="M35 82 L22 120" stroke="${Y}" stroke-width="14"${S} opacity=".4"/><path d="M105 82 L118 120" stroke="${Y}" stroke-width="14"${S} opacity=".4"/>`,
  elbow:`<circle cx="22" cy="120" r="10" fill="${Y}" opacity=".35"/><circle cx="118" cy="120" r="10" fill="${Y}" opacity=".35"/>`,
  wrist:`<circle cx="14" cy="155" r="8" fill="${Y}" opacity=".35"/><circle cx="126" cy="155" r="8" fill="${Y}" opacity=".35"/>`,
  fingers:`<path d="M8 162 L4 172 M11 162 L9 173 M14 162 L14 174 M17 162 L19 172" stroke="${Y}" stroke-width="3"${S} opacity=".7"/><path d="M120 162 L116 172 M123 162 L121 173 M126 162 L126 174 M129 162 L131 172" stroke="${Y}" stroke-width="3"${S} opacity=".7"/>`,
  hips:`<ellipse cx="70" cy="168" rx="28" ry="14" fill="${Y}" opacity=".3"/><ellipse cx="70" cy="168" rx="28" ry="14" stroke="${Y}" stroke-width="2" fill="none"/>`,
  thigh:`<path d="M58 175 L50 215" stroke="${Y}" stroke-width="16"${S} opacity=".35"/><path d="M82 175 L90 215" stroke="${Y}" stroke-width="16"${S} opacity=".35"/>`,
  knee:`<circle cx="48" cy="222" r="10" fill="${Y}" opacity=".35"/><circle cx="92" cy="222" r="10" fill="${Y}" opacity=".35"/>`,
  calf:`<path d="M46 232 L42 265" stroke="${Y}" stroke-width="12"${S} opacity=".35"/><path d="M94 232 L98 265" stroke="${Y}" stroke-width="12"${S} opacity=".35"/>`,
  ankle:`<circle cx="40" cy="270" r="8" fill="${Y}" opacity=".4"/><circle cx="100" cy="270" r="8" fill="${Y}" opacity=".4"/>`,
  foot:`<ellipse cx="35" cy="282" rx="14" ry="6" fill="${Y}" opacity=".35"/><ellipse cx="105" cy="282" rx="14" ry="6" fill="${Y}" opacity=".35"/>`,
  joint:`<circle cx="42" cy="78" r="6" fill="${Y}" opacity=".5"/><circle cx="98" cy="78" r="6" fill="${Y}" opacity=".5"/><circle cx="22" cy="120" r="6" fill="${Y}" opacity=".5"/><circle cx="118" cy="120" r="6" fill="${Y}" opacity=".5"/><circle cx="48" cy="222" r="6" fill="${Y}" opacity=".5"/><circle cx="92" cy="222" r="6" fill="${Y}" opacity=".5"/><circle cx="40" cy="270" r="6" fill="${Y}" opacity=".5"/>`,
  instep:`<path d="M30 276 L22 282 M110 276 L118 282" stroke="${Y}" stroke-width="6"${S} opacity=".6"/><ellipse cx="25" cy="282" rx="10" ry="4" fill="${Y}" opacity=".4"/><ellipse cx="115" cy="282" rx="10" ry="4" fill="${Y}" opacity=".4"/>`
};
function bodyHL(region){
  return `<svg viewBox="0 0 140 300" xmlns="http://www.w3.org/2000/svg">
<circle cx="70" cy="28" r="18" fill="${BD}"/>
<path d="M70 46 L70 60" stroke="${BD}" stroke-width="12"${S}/>
<path d="M70 68 L70 162" stroke="${BD}" stroke-width="28"${S}/>
<path d="M35 82 L22 120 L14 158" stroke="${BD}" stroke-width="10"${S}/>
<path d="M105 82 L118 120 L126 158" stroke="${BD}" stroke-width="10"${S}/>
<circle cx="14" cy="160" r="5" fill="${BD}"/><circle cx="126" cy="160" r="5" fill="${BD}"/>
<path d="M58 168 L48 222 L40 270" stroke="${BD}" stroke-width="12"${S}/>
<path d="M82 168 L92 222 L100 270" stroke="${BD}" stroke-width="12"${S}/>
<ellipse cx="35" cy="280" rx="12" ry="5" fill="${BD}"/><ellipse cx="105" cy="280" rx="12" ry="5" fill="${BD}"/>
${BODY_REGIONS[region]||''}
</svg>`;
}
const BODY_KEYS=['head','neck','shoulder','scapula','armpit','chest','belly','back','arm','elbow','wrist','fingers','hips','thigh','knee','calf','ankle','foot','joint','instep'];

// ========================================
//  ITEM ILLUSTRATIONS (IL)
// ========================================
const IL={};

// --- Body parts (20) ---
BODY_KEYS.forEach((k,i)=>{IL['body_'+i]=bodyHL(k);});

// --- vocab (8) ---
IL['vocab_0']=`<svg viewBox="0 0 280 140" xmlns="http://www.w3.org/2000/svg">
<circle cx="80" cy="50" r="16" fill="${B1}"/><path d="M80 66 L80 100 M65 78 L80 88 L95 78 M80 100 L70 128 M80 100 L90 128" stroke="${B1}" stroke-width="10"${S}/>
<circle cx="200" cy="50" r="16" fill="${R1}"/><path d="M200 66 L200 100 M185 78 L200 88 L215 78 M200 100 L190 128 M200 100 L210 128" stroke="${R1}" stroke-width="10"${S}/>
<path d="M80 48 Q80 35 95 40" stroke="${B1}" stroke-width="4"${S}/><path d="M200 48 Q200 35 185 40" stroke="${R1}" stroke-width="4"${S}/>
<rect x="108" y="18" width="65" height="30" rx="12" fill="none" stroke="${Y}" stroke-width="2"/><path d="M130 48 L125 42" fill="none" stroke="${Y}" stroke-width="1.5"/>
<text x="140" y="38" fill="${Y}" font-size="16" text-anchor="middle" font-weight="700" font-family="sans-serif">Oss!</text>
</svg>`;
IL['vocab_1']=`<svg viewBox="0 0 280 150" xmlns="http://www.w3.org/2000/svg">
<rect x="25" y="15" width="80" height="110" rx="6" fill="none" stroke="#ccc" stroke-width="2.5"/>
<path d="M65 15 L55 35 L50 70 M65 15 L75 35 L80 70" fill="none" stroke="#ccc" stroke-width="2.5"/><line x1="40" y1="82" x2="90" y2="82" stroke="${B2}" stroke-width="5" stroke-linecap="round"/>
<text x="65" y="105" fill="#ccc" font-size="10" text-anchor="middle" font-family="sans-serif">Gi</text>
<rect x="170" y="15" width="80" height="80" rx="8" fill="none" stroke="${R2}" stroke-width="2.5"/>
<path d="M185 15 L175 25 M265 15 L255 25" stroke="${R2}" stroke-width="2"${S}/>
<line x1="180" y1="50" x2="240" y2="50" stroke="${R2}" stroke-width="1" opacity=".4"/>

const DATA = [
  {id:'vocab',title:'基本語彙',subtitle:'Basic BJJ Vocabulary',desc:'柔術コミュニティで日常的に使われる基本用語。日本語やポルトガル語からの借用語も多く含まれる。',type:'term',items:[
    {term:'Oss (Osu)',meaning:'了解、こんにちは、ありがとう',detail:'BJJにおいて最も汎用性の高い言葉。挨拶、同意、敬意の表明、または困難に耐える精神を示す言葉として用いられる。'},
    {term:'Gi / No-Gi',meaning:'道着（ギ）/ ノーギ',detail:'日本語の「稽古着」に由来する。Kimonoと呼ばれることもあるが、Giが定着している。No-Giはラッシュガード等で行う練習を指す。'},
    {term:'Mat',meaning:'マット、畳',detail:'練習を行う領域。神聖な場所とされ、マットに上がる際、降りる際はお辞儀をするのが普遍的なエチケット。'},
    {term:'Professor / Coach',meaning:'先生、インストラクター',detail:'黒帯の指導者をProfessor、それ以下の帯の指導者をCoachと呼ぶことが一般的。'},
    {term:'Roll / Rolling',meaning:'スパーリング',detail:'BJJにおける実戦形式の練習。単なる「Fight」ではなく、技術を試し合う流動的なプロセスを指す。'},
    {term:'Drill',meaning:'打ち込み、反復練習',detail:'筋肉の記憶（マッスルメモリー）を構築するために、特定の技術を何度も反復する練習プロセス。'},
    {term:'Collar / Lapel',meaning:'衿（えり）/ ラペル（下衿）',detail:'道着の衿。クロスカラーチョークなど絞め技やグリップの基本となる部位。Lapelは衿の下部の垂れた部分で、ラペルガードなど現代柔術の重要な武器。"Grab the collar（衿を掴んで）"は最頻出の指示。'},
    {term:'Sleeve / Cuff',meaning:'袖 / 袖口',detail:'スパイダーガードや各種グリップコントロールの基本。袖口はCuff。"Grip the sleeve at the cuff（袖口の位置で袖を掴む）"のように使われる。'},
    {term:'Pants / Pant Cuff',meaning:'ズボン / 裾（すそ）',detail:'裾（Pant cuff）はズボンの足首側の端。デラヒーバガードやトレアンドパスでのグリップの要。"Grip the pants at the knee（膝の位置でズボンを掴む）"も頻出。なお上着の帯から下の垂れ部分はSkirt（スカート）と呼ぶ。'}]},
  {id:'rules',title:'ルール基礎',subtitle:'Competition Rules Basics',desc:'IBJJFルールを基準とした試合の基本。ポイントシステムと帯別の禁止技をざっくり押さえる。道場によりローカルルールがある場合は先生に確認を。',type:'term',items:[
    {term:'Belt Ranks',meaning:'帯の階級',detail:'大人は 白 → 青 → 紫 → 茶 → 黒 の5段階。各帯には最大4本のストライプ（黒い帯先の白線）が付く。青帯には16歳以上の年齢制限がある。'},
    {term:'Takedown / Sweep = 2 pts',meaning:'テイクダウン / スイープ = 2点',detail:'相手を倒して上を取る（テイクダウン）、またはガードから相手をひっくり返して上になる（スイープ）と2点。ニーオンベリーも2点。3秒間の維持が必要。'},
    {term:'Guard Pass = 3 pts',meaning:'パスガード = 3点',detail:'相手のガード（脚による防御）を通過してサイドコントロール等を確保すると3点。'},
    {term:'Mount / Back = 4 pts',meaning:'マウント / バックコントロール = 4点',detail:'マウント、バックマウント、両フック付きバックコントロールの確保は最高の4点。'},
    {term:'Advantage / Penalty',meaning:'アドバンテージ / ペナルティ',detail:'ポイントに至らなかった惜しい攻め（サブミッションを仕掛けた等）はアドバンテージ。消極的な試合運び（ストーリング）にはペナルティ。同点時の勝敗判定に使われる。'},
    {term:'Submission Victory',meaning:'一本勝ち（サブミッション）',detail:'相手がタップ（手や足で2回以上叩く、または口頭で「Tap」と言う）すれば、ポイントに関係なく即勝利。'},
    {term:'Illegal: Slam / Spinal Lock',meaning:'反則：スラム / 脊椎への極め',detail:'相手を持ち上げて叩きつけるスラムは全帯で反則。チョークを伴わないネッククランク等の脊椎攻撃、シザーテイクダウンも禁止。'},
    {term:'Leg Locks by Belt',meaning:'帯別の足関節ルール',detail:'Gi試合では白〜紫帯はストレートアンクルロックのみ合法。ニーバー・トーホールドは茶帯以上。ヒールフックはGiでは全帯禁止（No-Giは茶・黒帯のみ解禁）。膝を内側に捻る「ニーリーピング」も下の帯では反則になるので注意。'}]},
  {id:'greetings',title:'挨拶・エチケット',subtitle:'Greetings & Etiquette',desc:'ゲスト対応と、世界共通で言われる道場エチケット。細かい作法はジムごとに違うので、迷ったら周りをよく観察して合わせるのが鉄則。',type:'phrase',items:[
    {term:'歓迎と確認',en:'"Welcome to our academy. Are you dropping in for today\'s class?"',meaning:'アカデミーへの歓迎の意を示し、本日のクラスへのドロップイン（出稽古）であるかを確認する。'},
    {term:'経歴の確認',en:'"Where do you usually train, and what belt are you?"',meaning:'相手の所属と帯色を確認し、スパーリングのペアリングや指導のレベルを調整する。'},
    {term:'事務手続き',en:'"Please sign the waiver here."',meaning:'免責同意書（Waiver）への署名を促す。法的なリスク管理として必須の表現。'},
    {term:'施設案内',en:'"The changing room and restrooms are over there."',meaning:'更衣室とトイレの場所を案内する。'},
    {term:'衛生管理（道着と体臭）',en:'"Please make sure your gi is freshly washed. A smelly gi is a big no-no."',meaning:'道着（帯も）は毎回洗濯し、体臭・汗臭さにも気を配るのが世界共通のマナー。臭う道着は最も嫌われるNG行為のひとつ。'},
    {term:'身だしなみ',en:'"Make sure your nails are trimmed short, and take off all jewelry before class."',meaning:'手足の爪は短く切り、指輪・ネックレス・ピアス等のアクセサリーは外す。相手を傷つけないための安全管理の基本。'},
    {term:'体格差・女性への配慮',en:'"When rolling with women or much lighter partners, don\'t just use your weight and strength. Let them work."',meaning:'女性や自分よりはるかに軽い相手とのスパーでは、体重と力で潰さず、ペースを合わせて技を出させる余地を作るのが暗黙のマナー。'},
    {term:'現地の習慣に従う',en:'"Just follow what the locals do. Some gyms bow when stepping on the mat, others don\'t."',meaning:'マットに上がる際のお辞儀や帯順の整列などの作法はジム・アカデミーごとに異なる（必ずお辞儀をするわけではない）。周りをよく観察して合わせるのが一番のエチケット。'}]},
  {id:'dropin',title:'出稽古・遠征',subtitle:'Drop-in Visits Abroad',desc:'海外のジムに出稽古（ドロップイン）する際に必要になる実践的な会話。事前連絡から当日の支払い、お土産購入まで。',type:'phrase',items:[
    {term:'事前の問い合わせ',en:'"Hi! I\'ll be in town next week. Do you accept drop-ins?"',meaning:'訪問前にメールやSNSのDMで連絡を入れるのが丁寧。「来週そちらの街に行くのですが、ドロップインは受け付けていますか？」'},
    {term:'料金の確認',en:'"What\'s the mat fee for a visitor? Can I pay by card?"',meaning:'ビジター料金（マットフィー）の確認。海外では10〜30ドル程度が相場で、無料のジムやTシャツ購入で無料になるジムもある。カード払い可否も確認すると安心。'},
    {term:'スケジュール確認',en:'"What time does the fundamentals class start? Do you have No-Gi classes?"',meaning:'クラスの開始時間とレベル（基礎/オールレベル/上級）、GiかNo-Giかを確認する。'},
    {term:'道着の規定',en:'"Do I need a white gi, or is any color okay?"',meaning:'アカデミーによっては道着の色に規定がある（白のみ、黒NG等）。事前に確認しておくとベター。'},
    {term:'レンタル・忘れ物',en:'"Do you rent gis? I forgot my belt — could I borrow one?"',meaning:'レンタル道着の有無の確認。旅行中の荷物を減らしたい時や、うっかり帯を忘れた時に使える表現。'},
    {term:'レベルの確認',en:'"Is this class okay for visitors? I\'m a blue belt with about three years of experience."',meaning:'自分が参加して問題ないクラスかを確認しつつ、帯と経験年数を簡潔に伝える。'},
    {term:'お土産・パッチ',en:'"Do you sell gym patches or rash guards?"',meaning:'ジムのパッチやラッシュガードの購入は、記念になるだけでなく、受け入れてくれたジムへの敬意と貢献にもなる定番の行動。'},
    {term:'お礼と再訪の約束',en:'"Thank you for having me! Can I tag the gym on Instagram? I\'ll come back next time I\'m in town."',meaning:'受け入れてくれたことへのお礼。SNSでのタグ付け確認と再訪の約束は、良い関係づくりの締めくくりになる。'}]},
  {id:'body',title:'身体部位',subtitle:'Anatomical Body Parts',desc:'技の説明において、関節や骨の正確な位置を指示するための身体部位の英単語。',type:'term',items:[
    {term:'Head / Forehead',meaning:'頭 / 額',detail:''},{term:'Neck / Throat',meaning:'首 / 喉、気管',detail:''},{term:'Shoulder',meaning:'肩',detail:''},{term:'Shoulder Blade (Scapula)',meaning:'肩甲骨',detail:''},{term:'Armpit',meaning:'脇の下',detail:''},{term:'Chest / Ribs',meaning:'胸 / 肋骨',detail:''},{term:'Belly / Torso',meaning:'腹 / 胴体',detail:''},{term:'Back / Spine',meaning:'背中 / 脊椎',detail:''},{term:'Arm / Forearm',meaning:'腕 / 前腕',detail:''},{term:'Elbow / Bicep',meaning:'肘 / 上腕二頭筋',detail:''},{term:'Wrist / Hand',meaning:'手首 / 手',detail:''},{term:'Fingers / Thumb',meaning:'指 / 親指',detail:''},{term:'Hips / Pelvis',meaning:'股関節、腰 / 骨盤',detail:''},{term:'Thigh / Hamstring',meaning:'太もも / ハムストリング',detail:''},{term:'Knee / Shin',meaning:'膝 / 脛（すね）',detail:''},{term:'Calf',meaning:'ふくらはぎ',detail:''},{term:'Ankle / Heel',meaning:'足首 / 踵（かかと）',detail:''},{term:'Foot / Toes',meaning:'足 / 足の指',detail:''},{term:'Joint / Ligament',meaning:'関節 / 靭帯',detail:''},{term:'Instep (Laces)',meaning:'足の甲',detail:''}]},
  {id:'injuries',title:'怪我・コンディション',subtitle:'Injuries & Conditions',desc:'スパーリング前に自身の怪我や疲労状態を共有し、事故を未然に防ぐための表現。',type:'phrase',items:[
    {term:'怪我の申告',en:'"I have a slight injury on my right shoulder, so please go easy on that side."',meaning:'右肩を痛めているため、そちら側への攻撃は手加減してほしい旨を伝える。'},
    {term:'関節の不安',en:'"My left knee is a bit tweaked, so I might tap early to leg locks."',meaning:'左膝に違和感があるため、足関節技には早めにタップすることを事前告知する。'},
    {term:'スタミナの欠如',en:'"I\'m feeling gassed today."',meaning:'「Gassed」はスタミナ切れ（ガス欠）を意味するスラング。疲労困憊であることを伝える。'},
    {term:'特有の症状',en:'Cauliflower ear / Staph infection / Ringworm',meaning:'湧き耳 / ブドウ球菌感染 / 白癬・水虫。BJJで発症しやすい外傷や皮膚感染症。これらがある場合は練習への参加を控えるべき。'}]},
  {id:'class',title:'クラス進行',subtitle:'Class Management & Drills',desc:'ウォームアップ、マット運動、ドリルの進行とパートナーワークの管理に使う指示表現。',type:'phrase',items:[
    {term:'開始の合図',en:'"Let\'s start with the warm-up. Jog in a circle."',meaning:'ウォームアップを始めましょう。円になってジョギングしてください。'},
    {term:'マット運動',en:'"Forward rolls and backward rolls down the mat."',meaning:'マットの端まで前転と後転を行ってください。'},
    {term:'受け身',en:'"Breakfalls. Tuck your chin to protect your head."',meaning:'受け身。頭を守るために顎を引いてください。'},
    {term:'エビ（ヒップエスケープ）',en:'"Shrimping (Hip escapes). Plant your feet and move your hips away."',meaning:'エビ。足を床につき、腰を遠ざけるように動かしてください。'},
    {term:'その他の動作',en:'"Bear crawls and sprawls."',meaning:'ベアクロールとスプロール。'},
    {term:'ペアの結成',en:'"Partner up." / "Grab a partner."',meaning:'参加者にペアを組むよう促す標準的な表現。'},
    {term:'役割の指定',en:'"One person on top, one person on the bottom."',meaning:'どちらが上のポジション（トップ）、どちらが下のポジション（ボトム）をとるかを指定する。'},
    {term:'受け手の態度',en:'"Uke, please provide a realistic but cooperative reaction."',meaning:'技を受ける側（Uke）に対し、完全に力を抜く（limp noodle）のではなく、適度な抵抗を保ちつつ協力するよう指示する。'},
    {term:'反復と交代',en:'"Let\'s do three reps each, then switch."',meaning:'それぞれ3回ずつ反復（reps）し、その後役割を交代（switch）するよう指示する。'},
    {term:'抵抗の追加',en:'"Add a little bit of resistance to check the mechanics."',meaning:'技の構造（メカニクス）を確認するため、受け手に少し抵抗を加えるよう求める。'}]},
  {id:'referee',title:'審判コマンド',subtitle:'Referee Commands',desc:'IBJJF等の公式ルールに基づくレフェリーコマンド。ポルトガル語が世界共通で使用される。',type:'phrase',items:[
    {term:'Combate! (Fight/Start)',en:'腕を前方に伸ばし、下方に振り下ろす。',meaning:'試合やスパーリングの開始、および中断後の再開を指示する。'},
    {term:'Parou! (Stop/Pause)',en:'両腕を肩の高さに上げ、手のひらを開く。',meaning:'動作の完全な停止。安全確保時、場外への逸脱時、またはタイマー終了時に用いる。'},
    {term:'Lute! (Penalty/Stalling)',en:'対象選手の胸を指差し、その後拳を肩の高さに上げる。',meaning:'ルーチ。消極的な姿勢（ストーリング）に対する警告やペナルティを与える際に用いる。'},
    {term:'Falta! (Foul)',en:'（Luteと同様のジェスチャー）',meaning:'重大な反則行為に対するペナルティ宣告。'},
    {term:'Adjust your gi',en:'両腕を腰の高さで交差させ、下方を指す。',meaning:'乱れた道着を直すよう指示する。'},
    {term:'Re-tie your belt',en:'仮想の帯を締めるジェスチャーをする。',meaning:'ほどけた帯を締め直すよう指示する。'}]},
  {id:'biomech',title:'バイオメカニクス',subtitle:'Biomechanics & Body Mechanics',desc:'「なぜその動きが有効なのか」を伝えるための生体力学的概念と身体操作の表現。',type:'long',items:[
    {title:'Frames（フレーム：骨格による防御壁）',sub:'骨格構造を利用して相手との間に空間を作る',en:'"Frames are critical to making the space necessary to protect yourself. Use your skeletal structure, not your muscles. Don\'t try to bench press your opponent away. Create a bony shield with your forearms or shins."',jp:'フレームは身を守る空間を作る上で極めて重要です。筋肉ではなく骨格構造を使用してください。相手をベンチプレスのようにはね除けようとせず、前腕や脛を使って骨の盾を作り出します。'},
    {title:'Frames 実践指示',sub:'フレームの具体的な使い方',en:'"Frame against their neck and far hip. Keep your elbows connected to your ribs to prevent your frame from collapsing."',jp:'相手の首と遠い側の腰に対してフレームを作ります。フレームが崩れないよう、肘は肋骨に接着させたままにしてください。'},
    {title:'Levers（レバー：てこの原理による力の増幅）',sub:'力を増幅させる装置（force multipliers）',en:'"Levers are force multipliers. To control an arm or leg effectively, you must access the end of the lever and control at least two of the three primary joints (shoulder, elbow, wrist)."',jp:'レバーは力を増幅させます。腕や脚を効果的にコントロールするには、レバーの末端にアクセスし、3つの主要な関節のうち少なくとも2つを制御しなければなりません。'},
    {title:'Wedges（ウェッジ：楔による固定）',sub:'相手の動きを阻害する、またはフレームをこじ開ける',en:'"Use wedges to block the opponent\'s movement or pry open their frames. Placing your hand next to their hip is a blocking wedge that prevents them from recovering guard."',jp:'相手の動きをブロックしたり、フレームをこじ開けたりするために楔（ウェッジ）を使います。相手の腰の横に手を置くことは、ガードの回復を防ぐブロッキング・ウェッジとなります。'},
    {title:'Base（ベース：土台と重心）',sub:'ポジションの安定性を確保する基盤',en:'"Base is the foundation and stability of your position. Widen your knees and keep your center of gravity low so you cannot be swept easily."',jp:'ベースとは、ポジションの土台であり安定性です。膝を広く開き、重心を低く保つことで、簡単にスイープされないようにします。'},
    {title:'Posture（ポスチャー：姿勢と脊椎の整列）',sub:'身体の整列状態を維持する',en:'"Posture is the alignment of your body. Keep your spine straight, your head up, and avoid looking down. From the bottom, your goal is to break their posture by pulling with your legs, not just your arms."',jp:'ポスチャーとは身体の整列状態です。背骨をまっすぐにし、頭を上げ、下を向かないようにします。下のポジションからは、腕だけでなく脚を使って引くことで、相手のポスチャーを崩すことが目標となります。'},
    {title:'Pressure（プレッシャー：圧力の集中）',sub:'体重をかけて動きを制限する',en:'"Pressure is the application of weight to restrict movement. Drop your hips and make them heavy. Apply cross-face pressure by driving your shoulder under their jaw to misalign their spine."',jp:'プレッシャーとは、動きを制限するために体重をかけることです。腰を落として重くしてください。相手の顎の下に肩を押し込むクロスフェイスのプレッシャーをかけ、相手の脊椎の直列を崩します。'},
    {title:'Active Toes（ライブトウ / 立てた足指）',sub:'前方への推進力と機動力を生む',en:'"Keep your toes active on the mat. Don\'t rest on the laces (seal feet). Driving off your live toes gives you mobility and forward pressure."',jp:'足の甲を寝かせるのではなく、足の指をマットに立てておく状態。これにより、前方への推進力と機動力が生まれ、相手に強力な圧力をかけることができる。'},
    {title:'Heavy Hips（重い腰）',sub:'体重の焦点を一点に絞るブレーディング技術',en:'"Sink your weight down directly into their chest. Open your hips and use one hip as a focal point to blade your pressure. Make them carry your weight."',jp:'筋肉の力で押さえつけるのではなく、股関節を開き、体重の焦点を一点に絞る（ブレーディング）ことで、相手に全体重を背負わせる技術。'},
    {title:'Stay Tight / Elbows In（タイトに保つ / 肘を閉じる）',sub:'隙をなくし関節技を防ぐ防御の基本',en:'"Stay tight. Keep your elbows glued to your ribs like a T-Rex. If your elbow leaves your body, your arm is exposed to submissions."',jp:'隙をなくし、関節技を防ぐための防御の基本姿勢。肘が体幹から離れると、レバーとして利用され、アームバー等の危険に晒される。'},
    {title:'Peel the Hand（グリップを剥がす）',sub:'チョーク防御時の末端からの剥がし方',en:'"When defending a choke, don\'t just pull their forearm. Peel the hand starting from the thumb or the knuckles to break the grip."',jp:'チョークを防御する際、手首や前腕を引くのではなく、親指や拳の関節といった末端からグリップを物理的に剥がす動作。'}]},
  {id:'positions',title:'ポジション',subtitle:'Positional Hierarchy',desc:'「Position before submission（極めの前にポジションあり）」の原則に基づく主要ポジション。',type:'long',items:[
    {title:'Side Control / Side Mount（サイドコントロール）',sub:'横四方固め — 有利な上のポジション',en:'"A dominant top position where you are perpendicular to the opponent, chest-to-chest. Keep shoulder pressure on the jawline while isolating their near arm. From the bottom, you must establish frames on the near hip and far shoulder, then shrimp to recover guard."',jp:'相手と垂直になり、胸と胸を合わせる有利な上のポジションです。顎のラインに肩のプレッシャーをかけながら、手前の腕を孤立させます。下の立場からは、手前の腰と遠い側の肩にフレームを作り、エビをしてガードを回復しなければなりません。'},
    {title:'Mount / Full Mount（マウントポジション）',sub:'「柔術の王様」— 最も強力なトップポジション',en:'"Considered the \'King of Jiu-Jitsu.\' You sit on top of the opponent\'s torso with your knees wide and hips heavy. Your goal is to maintain posture, control the head, and isolate arms for submissions. From the bottom, trap an arm and a leg to initiate a bridge and roll (Upa) escape."',jp:'「柔術の王様」とみなされるポジションです。相手の胴体の上に座り、膝を広く開き、腰を重くします。目標は姿勢を保ち、頭をコントロールし、極め技のために腕を孤立させることです。下の立場からは、腕と脚をトラップして、ブリッジ＆ロール（ウパ）によるエスケープを開始します。'},
    {title:'Back Control（バックコントロール）',sub:'BJJにおいて最も有利なポジション',en:'"The most dominant position in BJJ. You control the opponent from behind using your legs as hooks inside their thighs and a seatbelt grip (one arm over the shoulder, one under the armpit) to manage the upper body. Keep your chest glued to their back; space allows them to escape."',jp:'BJJにおいて最も有利なポジションです。背後から両脚を太ももの内側へのフックとして使い、上半身を管理するためにシートベルトグリップ（片腕は肩越し、片腕は脇の下）を用いてコントロールします。胸を相手の背中に密着させてください。隙間ができるとエスケープを許してしまいます。'}]},
  {id:'guards',title:'ガードシステム',subtitle:'Guard Systems',desc:'下からの攻撃と防御の要。現代柔術における多様なガードの目的と足の配置。',type:'long',items:[
    {title:'Closed Guard（クローズドガード）',sub:'両脚で相手の腰をロックする基本ガード',en:'"Your legs are wrapped and locked around your opponent\'s waist. The core strategy is to break their posture and base. Do not just pull with your arm strength; use your legs and core to pull their weight forward. This off-balances them and opens up sweeps and submissions."',jp:'両脚を相手の腰に巻き付けてロックします。核となる戦略は、相手の姿勢とベースを崩すことです。腕の力だけで引くのではなく、脚と体幹を使って相手の体重を前方に引き出します。これによりバランスが崩れ、スイープや極め技への展開が開けます。'},
    {title:'Half Guard / Deep Half Guard（ハーフガード）',sub:'相手の片脚をトラップするガード',en:'"You have one of your opponent\'s legs trapped between yours. The bottom player must use an underhook and a knee shield to prevent cross-facing. If you transition to Deep Half, you move entirely underneath their center of gravity to destabilize their base, opening up rollover sweeps and back takes."',jp:'相手の片脚を自分の両脚で挟んでトラップします。下のプレイヤーは、クロスフェイスを防ぐためにアンダーフック（脇差し）とニーシールド（膝の盾）を使わなければなりません。ディープハーフに移行する場合は、相手の重心の完全に下へ潜り込み、ベースを不安定にして、ロールオーバースイープやバックテイクへの展開を開きます。'},
    {title:'Spider Guard（スパイダーガード）',sub:'袖をコントロールし足を相手の上腕に配置するガード',en:'"An open guard where you control the sleeves with a pocket grip and place your feet on their biceps. This stretches the opponent out and allows you to constantly off-balance them. Proper foot angle and tension are crucial to prevent the guard pass."',jp:'ポケットグリップで袖をコントロールし、足を相手の上腕二頭筋に配置するオープンガードです。これにより相手の身体を伸ばし、絶えずバランスを崩すことが可能になります。パスガードを防ぐためには、適切な足の角度と張力が極めて重要です。'},
    {title:'De La Riva Guard（デラヒーバガード）',sub:'相手の脚の外側からフックするガード',en:'"You hook one leg around the outside of the opponent\'s lead leg while controlling their ankle and sleeve. This guard focuses heavily on lower body control and is a primary setup for taking the back or executing the sickle sweep."',jp:'相手の前の脚の外側から片脚をフックし、同時に足首と袖をコントロールします。このガードは下半身の制御に重きを置いており、バックテイクやシックルスイープを実行するための主要なセットアップとなります。'}]},
  {id:'techniques',title:'テクニック',subtitle:'Sweeps, Passes & Submissions',desc:'個別の技術をデモンストレーションしながら英語で解説する実践的スクリプト。',type:'long',items:[
    {title:'Scissor Sweep（シザースイープ）',sub:'スイープ — クローズドガードからマウントを奪取',en:'"Establish a collar and sleeve grip. Open your guard and shrimp slightly to create an angle. Place your top shin across their belt line. Pull them forward to break their balance, then scissor your legs—chop the bottom leg while sweeping with the top leg—to end up in the mount."',jp:'襟と袖のグリップを作ります。ガードを開き、少しエビをして角度を作ります。上のすねを相手のベルトラインに当てます。相手を前に引いてバランスを崩し、脚をハサミのように動かして—下の脚を払いながら上の脚で掃くようにして—マウントを取ります。'},
    {title:'Hip Bump Sweep（ヒップバンプスイープ）',sub:'スイープ — 上体を起こしてバランスを崩す',en:'"When you can\'t break their posture in closed guard, open your legs, post on your hand, and sit up quickly. Trap their arm above the elbow, thrust your hips forward to knock them off-balance, and sweep them onto their back to achieve the mount."',jp:'クローズドガードで相手の姿勢を崩せない時、脚を開き、手をついて素早く上体を起こします。相手の肘より上をトラップし、腰を前方に突き出してバランスを崩させ、背中から倒してマウントを奪取します。'},
    {title:'Double Leg Takedown（両足タックル）',sub:'テイクダウン — レベルチェンジから押し込む',en:'"Change your elevation to get below their defense. Take a deep penetration step. Wrap both arms around their legs behind the knees, and drive diagonally. Keep your head up and outside their ribs to avoid the guillotine choke."',jp:'ディフェンスの下に入るために姿勢を低く（レベルチェンジ）します。深く踏み込みます。両腕を相手の両膝の後ろに回し、斜めに押し込みます。ギロチンチョークを防ぐため、頭は上げ、相手の肋骨の外側に置いてください。'},
    {title:'Knee Slice / Knee Cut（ニースライス）',sub:'パスガード — すねを斜めに押し当てて通過',en:'"Drive your shin diagonally across their thigh. Get a deep underhook on the far side to prevent them from taking your back. Keep your chest heavy, slide your knee completely through to the mat, and establish side control."',jp:'すねを相手の太ももに斜めに押し当てます。バックを取られないように、逆側に深いアンダーフック（脇差し）を取ります。胸の重さを保ち、膝を完全にマットまで滑り込ませて、サイドコントロールを確立します。'},
    {title:'Torreando / Bullfighter Pass（トレアドールパス）',sub:'パスガード — 左右の動きでフックを避ける',en:'"Grip their pants near the knees. Step to one side and employ rapid side-to-side movement to avoid their hooks. Push their legs away and circle around their guard to secure side control. Keep your posture upright."',jp:'膝付近のズボンをグリップします。片側にステップし、素早い左右の動きを用いて相手のフックを避けます。脚を押し退け、ガードの外側を回り込んでサイドコントロールを確保します。姿勢は直立を保ってください。'},
    {title:'Triangle Choke（三角絞め）',sub:'サブミッション — 脚で首と片腕を捕らえて絞める',en:'"Push one arm in and pull the other arm out (one in, one out). Shoot your hips up to catch their neck and one arm. Lock your legs by bringing your calf over your ankle. Cut the angle—look into their ear—pull the head down, and squeeze your knees together to restrict the blood flow to the brain."',jp:'片腕を押し込み、もう片腕を引き出します。腰を跳ね上げ、相手の首と片腕を捕らえます。ふくらはぎを足首に乗せて脚をロックします。角度を変え—相手の耳を覗き込むように—頭を引き下げ、両膝を強く締めて脳への血流を制限します。'},
    {title:'Armbar / Juji-Gatame（腕十字）',sub:'サブミッション — 肘関節を過伸展させる',en:'"Isolate the arm. Secure a two-on-one grip. Swing your leg over their head to break their posture. Pinch your knees tightly. Control their wrist with the thumb pointing up, and slowly elevate your hips to hyperextend the elbow joint."',jp:'腕を孤立させます。ツーオンワンのグリップを確保します。脚を相手の頭を越すように回して姿勢を崩します。両膝をしっかり締めます。親指が上を向くように手首をコントロールし、ゆっくりと腰を上げて肘関節を過伸展させます。'},
    {title:'Kimura（キムラロック / 腕絡み）',sub:'サブミッション — フィギュアフォーグリップで肩を極める',en:'"Control the wrist. Sit up, reach your other arm over their shoulder, and thread it through to grab your own wrist, creating a figure-four grip. Fall back, keep their arm bent at a 90-degree angle, and rotate their hand toward the back of their head."',jp:'手首をコントロールします。上体を起こし、もう片方の腕を肩越しに伸ばして通し、自分の手首を掴んでフィギュアフォー（4の字）グリップを作ります。後ろに倒れ、腕を90度に曲げたまま、手を後頭部の方向へ回転させます。'},
    {title:'Rear Naked Choke / RNC（裸絞め）',sub:'サブミッション — バックから首を絞める最強の極め',en:'"From back control, thread one arm around the neck, hand to bicep, and place the opposite hand behind their head. Keep your head tight to theirs and squeeze using your back and shoulders. Do not crank the neck; compress smoothly."',jp:'バックコントロールから、片腕を首に回して上腕二頭筋を掴み、反対の手を相手の後頭部に置きます。自分の頭を相手の頭に密着させ、背中と肩を使って絞め上げます。首を捻らず、滑らかに圧迫してください。'}]},
  {id:'sparring',title:'スパーリング',subtitle:'Sparring Communication',desc:'スパーリングの誘い方、強度の設定、安全管理、終了後のコミュニケーション。',type:'phrase',items:[
    {term:'誘いの表現',en:'"Would you like to roll?" / "Care for a round?"',meaning:'スパーリングしませんか？ / 1ラウンドやりませんか？'},
    {term:'強度の設定',en:'"Let\'s go light. Maybe around 70%?"',meaning:'軽く行きましょう。70%くらいの力でどうですか？'},
    {term:'フロースパー',en:'"Can we flow roll? I want to focus on movement and transitions without muscling it."',meaning:'フロースパー（力に頼らず動きを止めないスパーリング）をしませんか？動きとトランジション（移行）に集中したいんです。'},
    {term:'ハードな練習',en:'"I\'m training for a competition, so can we go hard?"',meaning:'試合に向けて練習しているので、ハードにやってもいいですか？'},
    {term:'タップの重要性',en:'"Remember to tap early and tap often. There is no ego on the mat. Tapping is just learning."',meaning:'早くタップし、頻繁にタップすることを忘れないでください。マットの上にエゴ（プライド）は不要です。タップすることは学ぶプロセスに過ぎません。'},
    {term:'安全な極め方',en:'"If you catch a joint lock, apply it slowly to give your partner time to tap."',meaning:'関節技を捕らえたら、パートナーがタップする時間を与えるためにゆっくり極めてください。'},
    {term:'禁止事項',en:'"Always grab 3 or more fingers at a time, never less. Finger bending is illegal."',meaning:'指を掴む時は常に3本以上をまとめて掴み、それ以下は避けてください。指を曲げる行為は反則です。'},
    {term:'安全確認と謝罪',en:'"Are you okay? Did I catch you with a stray knee?" / "Sorry, that was my fault."',meaning:'大丈夫ですか？ 流れ弾の膝が当たりましたか？ / ごめんなさい、私のミスです。'},
    {term:'リセットの指示',en:'"We are getting too close to the wall. Let\'s reset in the center. Keep the same position."',meaning:'壁に近づきすぎています。中央でリセットしましょう。同じポジションのままで。'},
    {term:'ロール終了後の称賛',en:'"Thank you for the roll. Your top pressure is incredibly heavy, and that scissor sweep was perfectly timed."',meaning:'スパーリングありがとうございました。あなたの上からのプレッシャーは信じられないほど重く、シザースイープのタイミングも完璧でした。'}]},
  {id:'magic',title:'魔法のフレーズ',subtitle:'Magic Phrases & Feedback',desc:'アドバイスを求める「魔法の質問」と、的確なフィードバックを与える表現。',type:'phrase',items:[
    {term:'最も簡単な方法を聞く',en:'"What is the easiest way to escape this position?"',meaning:'このポジションからエスケープする「最も簡単な」方法は何ですか？'},
    {term:'成功率の高い技を聞く',en:'"What is your highest percentage submission from here?"',meaning:'ここから「最も成功率（ハイ・パーセンテージ）の高い」サブミッションは何ですか？'},
    {term:'十八番を聞く',en:'"What is your bread and butter sweep from the open guard?"',meaning:'オープンガードからの「あなたの十八番（ブレッド・アンド・バター）」のスイープは何ですか？'},
    {term:'力の使いすぎ',en:'"You are using too much strength. Try to rely more on leverage and body mechanics."',meaning:'力を使いすぎています。てこの原理と生体力学にもっと頼ってみてください。'},
    {term:'呼吸とリラックス',en:'"Don\'t hold your breath. Relax your face and your grips unless you need them to control the posture."',meaning:'息を止めないでください。姿勢をコントロールする必要がある時以外は、顔の表情とグリップの力を抜いてリラックスしましょう。'},
    {term:'ポジション優先',en:'"Remember: Position before submission. Secure the dominant position first, then look for the attack."',meaning:'忘れないでください。極めの前にポジションです。まず有利なポジションを安定させてから、攻撃を探しましょう。'}]}
];

{sp:'N',en:'Ken, a blue belt from Tokyo, is planning a trip to San Diego. Before flying, he sends a message to a local BJJ academy.',jp:'東京の青帯ケンはサンディエゴ旅行を計画中。出発前に、現地の柔術アカデミーへメッセージを送る。'},

{sp:'N',en:'A week later, Ken walks into the academy. His gi is freshly washed — a smelly gi is a big no-no anywhere in the world.',jp:'一週間後、ケンはアカデミーに到着。道着は洗いたてだ。臭う道着は世界中どこでもNG。'},

{sp:'B',en:'Shrimping! Plant your feet and move your hips away. Now bear crawls and sprawls!',jp:'エビ！足を突っ張って腰を遠ざける。次はベアクロールとスプロール！'},
{sp:'N',en:'Warm-up done. Time to drill.',jp:'ウォームアップ終了。ドリルの時間だ。'},
{sp:'B',en:'Partner up! Today\'s technique is the scissor sweep from closed guard.',jp:'ペアを組んで！今日の技はクローズドガードからのシザースイープです。'},
{sp:'B',en:'Grip the collar — or the lapel — and the sleeve at the cuff. Place your shin across their belt line, like a blade.',jp:'衿——またはラペル——と袖口を掴む。すねを刃のようにベルトラインに当てて。'},

{title:'Story 2: Open Mat Rounds — オープンマットのロール',desc:'スパーリングの誘い方から強度設定、ガード・ポジションの攻防、バイオメカニクス、タップの哲学まで。スパーリング・怪我・魔法のフレーズを網羅した長編。',speakers:{A:'Ken',B:'Maria',C:'Tom',N:'ナレ'},lines:[

{sp:'B',en:'Got it. Let\'s go light, around seventy percent. If I catch a joint lock, I\'ll apply it slowly — tap any time.',jp:'了解。軽めに、70％くらいで。関節を取ったらゆっくり極めるから、いつでもタップしてね。'},

{sp:'N',en:'Maria postures up — head up, spine straight — elbows glued to her ribs like a T-Rex.',jp:'マリアは頭を上げ、背筋を伸ばして姿勢を立てる。肘はティラノサウルスのように肋骨へ密着。'},
{sp:'N',en:'She stands with a wide, stable base, wedges a hand against Ken\'s hip, and starts a toreando pass, gripping the pants at both knees.',jp:'広く安定したベースで立ち上がり、手をケンの腰に楔（くさび）として当て、両膝のズボンを掴んでトレアンドパスを開始。'},
{sp:'N',en:'Ken frames on her shoulders, shrimps away, and recovers half guard with a strong knee shield.',jp:'ケンは肩にフレームを当て、エビで腰を逃がし、ニーシールド付きのハーフガードを回復。'},
{sp:'N',en:'Maria switches to a knee slice — her shin cuts across his thigh, her underhook digs deep into his armpit.',jp:'マリアはニースライスへ切り替える。すねが太ももを横切り、アンダーフックが脇の下深くに刺さる。'},
{sp:'N',en:'Side control. Her hips are heavy, her shoulder presses his jawline, and her toes stay active — never flat on the laces.',jp:'サイドコントロール。腰は重く、肩が顎のラインを圧迫し、足の指は常に立てたまま——足の甲を寝かせない。'},

{sp:'N',en:'But Maria floats into mount, knees wide, squeezing his pelvis.',jp:'だがマリアはふわりとマウントへ。膝を広げ、骨盤を挟み込む。'},

{sp:'N',en:'Maria sits up for a hip bump sweep. Ken barely posts his hand in time.',jp:'マリアはヒップバンプスイープで起き上がる。ケンは間一髪で手をついて防ぐ。'},

{sp:'N',en:'Then an outside hook on his lead leg — De La Riva — controlling the ankle and sleeve.',jp:'さらに前脚の外側にフック——デラヒーバだ。足首と袖をコントロールする。'},

{sp:'N',en:'She passes and takes the back — chest tight to his shoulder blades, hooks in, seatbelt grip.',jp:'パスからバックへ。胸を肩甲骨に密着させ、両フックを入れて、シートベルトグリップ。'},
{sp:'N',en:'A forearm slides toward his throat. Ken tucks his chin and peels the hand, starting from the thumb.',jp:'前腕が喉元へ滑り込む。ケンは顎を引き、親指側から手を剥がしにかかる。'},

{sp:'B',en:'The rear naked choke, no question. From side control I hunt the kimura — wrist control, figure-four grip, rotate toward the back of the head.',jp:'文句なしで裸絞めね。サイドコントロールからはキムラを狙うわ——手首を制して、4の字グリップ、後頭部の方向へ回す。'},

{sp:'N',en:'Tom explodes forward and grabs just two of Ken\'s fingers to break a grip.',jp:'トムは爆発的に前進し、グリップを切ろうとケンの指を2本だけ掴む。'},
{sp:'B',en:'Careful, Tom! Always grab three or more fingers, never less. Finger bending is illegal.',jp:'気をつけて、トム！指は必ず3本以上まとめて掴むこと。指曲げは反則よ。'},

{sp:'N',en:'The buzzer sounds. Everyone is gassed — red faces, burning lungs.',jp:'ブザーが鳴る。全員ガス欠だ——赤い顔に、燃えるような肺。'},
{sp:'A',en:'Maria, can we flow roll to cool down? I want to focus on transitions without muscling anything.',jp:'マリア、クールダウンにフロースパーしませんか？力に頼らず、トランジションに集中したいんです。'},
{sp:'B',en:'Perfect. One tip first: in your triangles — one arm in, one arm out, shoot your hips up. You\'re using too much strength. Relax your grips, cut the angle, and squeeze your knees.',jp:'いいね。その前にひとつアドバイス。三角絞めは「片腕を入れ、片腕を出し、腰を跳ね上げる」。今は力みすぎ。グリップを緩めて、角度を作って、膝を締めるの。'},
{sp:'A',en:'Oss! Thank you for the rolls. Your pressure is unbelievable, and that deep half sweep was perfectly timed.',jp:'オス！ありがとうございました。プレッシャーは信じられない重さでしたし、ディープハーフスイープのタイミングも完璧でした。'},
{sp:'N',en:'On the notice board: "No training with ringworm, staph, or open cuts. Wash your gi and belt after every session."',jp:'掲示板にはこう書いてある。「白癬・ブドウ球菌感染・開いた傷がある場合は練習禁止。道着と帯は毎回洗濯すること」'}]},
{title:'Story 3: Competition Day — 試合の日',desc:'審判コマンド、ポイントシステム、帯別ルール、反則、そして一本勝ちまで。ルール・審判・テクニックの表現を網羅した長編。',speakers:{A:'Ken',B:'Referee',N:'ナレ'},lines:[
{sp:'N',en:'Sunday. A local tournament. In the venue, all five adult belts: white, blue, purple, brown, and black.',jp:'日曜、地元のトーナメント。会場には大人の5つの帯が揃う——白、青、紫、茶、黒。'},
{sp:'N',en:'At blue belt in Gi, heel hooks are illegal and knee reaping is a foul. Only the straight ankle lock is allowed — kneebars and toe holds must wait until brown belt.',jp:'青帯のGi試合ではヒールフックは反則、ニーリーピングも反則。合法なのはストレートアンクルロックのみ——ニーバーとトーホールドは茶帯までお預けだ。'},
{sp:'N',en:'Ken warms up, checking every joint and ligament — neck, shoulders, wrists, hips, knees, ankles — and stretches his hamstrings and calves.',jp:'ケンはウォームアップ。首、肩、手首、股関節、膝、足首——関節と靭帯をすべてチェックし、ハムストリングとふくらはぎを伸ばす。'},
{sp:'B',en:'Adjust your gi and re-tie your belt, please.',jp:'道着を直して、帯を締め直してください。'},

{sp:'N',en:'Ken changes his level, drops his hips, and shoots the double leg — head up, head outside the ribs, arms wrapped behind the knees, drive diagonally!',jp:'ケンはレベルを変えて腰を落とし、ダブルレッグへ——頭を上げ、肋骨の外側に置き、両腕を膝裏に回して、斜めに押し込む！'},
{sp:'N',en:'Takedown, two points! And no lifting and slamming — slams are illegal at every belt. He finishes with control.',jp:'テイクダウンで2点！持ち上げて叩きつけるのはダメだ——スラムは全帯で反則。コントロールしながら倒しきる。'},
{sp:'N',en:'The opponent closes his guard and grabs a deep collar grip. Ken postures — head up, straight spine — and peels the hand from the thumb.',jp:'相手はガードを閉じ、深い衿グリップを取る。ケンは頭を上げ、背筋を伸ばして姿勢を立て、親指側から手を剥がす。'},
{sp:'N',en:'Ken stands, opens the guard, and knee slices across the thigh with a deep underhook. Guard pass — three points!',jp:'ケンは立ってガードを開き、深いアンダーフックとともにニースライス。パスガードで3点！'},
{sp:'N',en:'He slides to knee on belly — two more points — and attacks the armbar: leg over the head, knees pinched, thumb up, hips rising.',jp:'ニーオンベリーへ移行——さらに2点——そして腕十字へ。脚を頭上に回し、膝を締め、親指は上向き、腰を上げていく。'},

{sp:'N',en:'Desperate, the opponent attempts a scissor takedown — dangerous and illegal.',jp:'追い込まれた相手はシザーテイクダウンを試みる——危険な反則技だ。'},
{sp:'B',en:'Falta!',jp:'ファウタ！（反則！）'},
{sp:'N',en:'Restart in the center. The opponent turns; Ken takes the back — hooks in, seatbelt — four points!',jp:'中央から再開。相手が背を向けた瞬間、ケンはバックを取る——両フックとシートベルトで4点！'},
{sp:'N',en:'Chest glued to the back, Ken threads his forearm under the chin, across the throat, and grips his own bicep.',jp:'胸を背中に密着させ、前腕を顎の下から喉へ通し、自分の上腕二頭筋を掴む。'},

{sp:'B',en:'Parou!',jp:'パロウ！（終了！）'},
{sp:'N',en:'Submission victory! The tap ends everything, whatever the score. Position before submission — always.',jp:'一本勝ち！スコアがどうであれ、タップが全てを終わらせる。「極めの前にポジション」——常にこれだ。'},
{sp:'A',en:'Oss! All those drills paid off.',jp:'オス！ドリルの積み重ねが実を結んだ。'},
{sp:'N',en:'On the podium, Ken re-ties his belt and thinks of the road ahead: purple, brown, black. Tomorrow, he drills again.',jp:'表彰台でケンは帯を締め直し、この先の道を思う——紫、茶、そして黒へ。明日もまた、ドリルだ。'}]}
];
DATA.push({id:'stories',title:'朗読ストーリー',subtitle:'Listening Stories',desc:'全カテゴリの単語とフレーズを織り込んだ長編ストーリー3本。連続再生・シャッフル再生で聞き流し学習ができます。行をクリックすると個別再生。',type:'story',items:STORIES});

// ========================================
//  APP LOGIC
// ========================================
let currentCategory = 'vocab';
let mode = 'study';
let learned = JSON.parse(localStorage.getItem('bjj_learned') || '{}');
const SPEAK_SVG = '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
function stripQuotes(t){return t.replace(/^["""]+|["""]+$/g,'').trim();}
function ttsFix(t){return t.replace(/no-gi/gi,'no ghee').replace(/\bgi\b/gi,'ghee');}
function getEnglishText(item){if(item.en)return stripQuotes(item.en);if(item.term)return item.term;return '';}
function speak(e,text){e.stopPropagation();const clean=ttsFix(stripQuotes(text));if(!clean)return;window.speechSynthesis.cancel();const btn=e.currentTarget;document.querySelectorAll('.speak-btn.speaking').forEach(b=>b.classList.remove('speaking'));btn.classList.add('speaking');const u=new SpeechSynthesisUtterance(clean);u.lang='en-US';u.rate=0.85;const voices=window.speechSynthesis.getVoices();const v=voices.find(v=>v.lang.startsWith('en')&&v.name.includes('Google'))||voices.find(v=>v.lang.startsWith('en-US'))||voices.find(v=>v.lang.startsWith('en'));if(v)u.voice=v;u.onend=()=>btn.classList.remove('speaking');u.onerror=()=>btn.classList.remove('speaking');window.speechSynthesis.speak(u);}
window.speechSynthesis.getVoices();
function getTotalItems(){return DATA.reduce((s,c)=>s+(c.type==='story'?0:c.items.length),0)}
function getLearnedCount(){return Object.keys(learned).length}
function itemKey(catId,idx){return catId+'_'+idx}
function updateGlobalProgress(){document.getElementById('globalProgress').textContent=getLearnedCount();document.getElementById('globalTotal').textContent=getTotalItems();}
function saveLearned(){localStorage.setItem('bjj_learned',JSON.stringify(learned));updateGlobalProgress();renderNav();}
function resetProgress(){if(!confirm('学習済みの記録をすべてリセットしますか？'))return;learned={};saveLearned();render();}
function setMode(m){stopStory();mode=m;document.querySelectorAll('.mode-btn').forEach(b=>{b.classList.toggle('active',b.dataset.mode===m);});render();}
function renderNav(){const nav=document.getElementById('navList');nav.innerHTML=DATA.map((cat,i)=>{const total=cat.items.length;const isStory=cat.type==='story';const done=isStory?0:cat.items.filter((_,j)=>learned[itemKey(cat.id,j)]).length;const completed=!isStory&&done===total;const cnt=isStory?`${total}話`:`${done}/${total}`;return `<div class="nav-item ${cat.id===currentCategory?'active':''} ${completed?'completed':''}" onclick="selectCategory('${cat.id}')"><span class="nav-num">${isStory?'&#9654;':i+1}</span><span class="nav-label">${cat.title}</span><span class="nav-count">${cnt}</span><span class="nav-check">&#10003;</span></div>`;}).join('');}
function selectCategory(id){stopStory();currentCategory=id;render();}
function toggleCard(catId,idx){const el=document.getElementById('card-'+catId+'-'+idx);if(!el)return;el.classList.toggle('revealed');}
function toggleLearned(e,catId,idx){e.stopPropagation();const key=itemKey(catId,idx);if(learned[key])delete learned[key];else learned[key]=1;saveLearned();const card=document.getElementById('card-'+catId+'-'+idx);if(card)card.classList.toggle('learned',!!learned[key]);}

function render(){
  renderNav();
  const cat=DATA.find(c=>c.id===currentCategory);if(!cat)return;
  const main=document.getElementById('mainContent');
  const catDone=cat.items.filter((_,j)=>learned[itemKey(cat.id,j)]).length;
  let html=`<div class="section-header"><h2>${cat.title} <span style="font-weight:400;color:var(--text-muted);font-size:1rem">${cat.subtitle}</span></h2><div class="section-desc">${cat.desc}</div></div>`;
  if(cat.type==='story'){
    html+=renderStoryMode(cat);
  }else{
    html+=`<div class="stats-bar"><div class="stat blue"><span class="stat-val">${cat.items.length}</span> 項目</div><div class="stat green"><span class="stat-val">${catDone}</span> 学習済</div><div class="stat red"><span class="stat-val">${cat.items.length-catDone}</span> 未学習</div></div>`;
    html+=`<div class="search-bar"><input type="text" placeholder="このカテゴリ内を検索..." oninput="filterItems(this.value)"></div>`;
    html+=mode==='study'?renderStudyMode(cat):renderRefMode(cat);
  }
  main.innerHTML=html;updateGlobalProgress();
}

function renderStudyMode(cat){
  if(cat.type==='long'){
    return cat.items.map((item,i)=>{
      const key=itemKey(cat.id,i);const isLearned=!!learned[key];
      const speakText=stripQuotes(item.en);
      const illust=IL[key]||'';
      return `<div class="long-card ${isLearned?'learned':''}" id="card-${cat.id}-${i}" onclick="toggleCard('${cat.id}',${i})" data-search="${(item.title+item.sub+item.en+item.jp).toLowerCase()}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="lc-title">${item.title}</div><div class="lc-sub">${item.sub}</div></div><div class="card-check" onclick="toggleLearned(event,'${cat.id}',${i})" title="学習済みにする">${isLearned?'&#10003;':''}</div></div>
        <div class="lc-en-row"><div class="lc-en">${item.en}</div><button class="speak-btn" onclick="speak(event,\`${speakText.replace(/`/g,"'")}\`)" title="読み上げ" style="margin-top:12px">${SPEAK_SVG}</button></div>
        <div class="lc-jp">${illust?`<div class="item-illust">${illust}</div>`:''}<div class="lc-jp-inner">${item.jp}</div></div>
        <div class="lc-tap">&#9650; クリックで日本語訳を表示</div>
      </div>`;
    }).join('');
  }
  let html=`<div class="cards-grid">`;
  cat.items.forEach((item,i)=>{
    const key=itemKey(cat.id,i);const isLearned=!!learned[key];
    const hasEn=item.en;const speakText=getEnglishText(item);
    const illust=IL[key]||'';
    html+=`<div class="card ${isLearned?'learned':''}" id="card-${cat.id}-${i}" onclick="toggleCard('${cat.id}',${i})" data-search="${((item.term||'')+(item.en||'')+(item.meaning||'')+(item.detail||'')).toLowerCase()}">
      <div class="card-check" onclick="toggleLearned(event,'${cat.id}',${i})" title="学習済みにする">${isLearned?'&#10003;':''}</div>
      <div class="card-top-row"><div class="card-term">${item.term}</div>${speakText?`<button class="speak-btn" onclick="speak(event,\`${speakText.replace(/`/g,"'")}\`)" title="読み上げ">${SPEAK_SVG}</button>`:''}</div>
      ${hasEn?`<div class="card-hint" style="color:var(--blue);font-size:.88rem;line-height:1.5">${item.en}</div>`:''}
      <div class="card-answer">${illust?`<div class="item-illust">${illust}</div>`:''}<div class="card-meaning">${item.meaning}</div>${item.detail?`<div class="card-detail">${item.detail}</div>`:''}</div>
      <div class="card-tap">&#9650; クリックで表示</div>
    </div>`;
  });
  return html+`</div>`;
}

function renderRefMode(cat){
  if(cat.type==='long'){
    let html=`<div style="overflow-x:auto"><table class="ref-table"><thead><tr><th>技術・概念</th><th>英語表現</th><th style="width:40px"></th><th>日本語解説</th></tr></thead><tbody>`;
    cat.items.forEach(item=>{const st=stripQuotes(item.en);html+=`<tr><td class="col-term">${item.title}<br><span style="font-weight:400;color:var(--text-dim);font-size:.78rem">${item.sub}</span></td><td class="col-detail" style="color:var(--blue)">${item.en}</td><td><button class="speak-btn ref-speak" onclick="speak(event,\`${st.replace(/`/g,"'")}\`)" title="読み上げ">${SPEAK_SVG}</button></td><td class="col-detail">${item.jp}</td></tr>`;});
    return html+`</tbody></table></div>`;
  }
  const hasEn=cat.items.some(it=>it.en);const hasDetail=cat.items.some(it=>it.detail);
  let html=`<div style="overflow-x:auto"><table class="ref-table"><thead><tr><th>${cat.type==='phrase'?'状況・目的':'英語用語'}</th>${hasEn?'<th>英語表現</th>':''}<th style="width:40px"></th><th>意味・ニュアンス</th>${hasDetail?'<th>備考</th>':''}</tr></thead><tbody>`;
  cat.items.forEach(item=>{const st=getEnglishText(item);html+=`<tr><td class="col-term">${item.term}</td>${hasEn?`<td class="col-detail" style="color:var(--blue)">${item.en||''}</td>`:''}<td><button class="speak-btn ref-speak" onclick="speak(event,\`${st.replace(/`/g,"'")}\`)" title="読み上げ">${SPEAK_SVG}</button></td><td class="col-meaning">${item.meaning}</td>${hasDetail?`<td class="col-detail">${item.detail||''}</td>`:''}</tr>`;});
  return html+`</tbody></table></div>`;
}

function renderStoryMode(cat){
  return `<div class="story-all-bar">
    <button class="story-play" id="story-all-btn" onclick="playAllStories(false)">&#9654; 全話連続再生</button>
    <button class="story-play secondary" id="story-shuffle-btn" onclick="playAllStories(true)">&#128256; シャッフル再生</button>
  </div>
  <div class="story-hint">&#9654; で個別再生、上のボタンで全話を通し・シャッフル再生。各行クリックでその行だけ聞けます。話者ごとに声のトーンが変わります。</div>`+cat.items.map((st,si)=>`
  <div class="story-card">
    <div class="story-head">
      <div style="flex:1;min-width:200px"><div class="story-title">${st.title}</div><div class="story-desc">${st.desc}</div></div>
      <button class="story-play" id="story-btn-${si}" onclick="playStory(${si})">&#9654; 朗読スタート</button>
    </div>
    <div class="story-lines">${st.lines.map((ln,li)=>`
      <div class="story-line" id="sline-${si}-${li}" onclick="speakStoryLine(${si},${li})">
        <div class="story-sp ${ln.sp}">${st.speakers[ln.sp]||ln.sp}</div>
        <div><div class="story-en">${ln.en}</div><div class="story-jp">${ln.jp}</div></div>
      </div>`).join('')}
    </div>
  </div>`).join('');
}

// --- Story playback engine ---
let storyPB={active:null,idx:0,token:0,queue:null,qpos:0};
function enVoices(){return window.speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith('en'));}
function storyVoice(spk){const vs=enVoices();if(!vs.length)return null;const us=vs.filter(v=>v.lang.replace('_','-').startsWith('en-US'));const pool=us.length?us:vs;if(spk==='B')return pool[1]||pool[0];if(spk==='N')return pool[2]||pool[0];if(spk==='C')return pool[3]||pool[1]||pool[0];return pool[0];}
function mkStoryUtter(line){
  const u=new SpeechSynthesisUtterance(ttsFix(stripQuotes(line.en)));
  u.lang='en-US';
  u.rate=line.sp==='N'?0.85:0.9;
  u.pitch=line.sp==='A'?1.12:line.sp==='B'?0.85:line.sp==='C'?1.0:1.0;
  const v=storyVoice(line.sp);if(v)u.voice=v;
  return u;
}
function playAllStories(shuffle){
  const ab=document.getElementById('story-all-btn');
  const wasPlaying=storyPB.queue!==null;
  stopStory();
  if(wasPlaying&&!shuffle)return;
  let q=STORIES.map((_,i)=>i);
  if(shuffle){for(let i=q.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=q[i];q[i]=q[j];q[j]=t;}}
  storyPB.queue=q;storyPB.qpos=0;
  if(ab){ab.innerHTML='&#9632; 停止';ab.classList.add('playing');}
  startQueued();
}
function startQueued(){
  if(!storyPB.queue)return;
  const si=storyPB.queue[storyPB.qpos];
  storyPB.active=si;storyPB.idx=0;storyPB.token++;
  const b=document.getElementById('story-btn-'+si);
  if(b){b.innerHTML='&#9632; 停止';b.classList.add('playing');}
  storyNext();
}
function playStory(si){
  if(storyPB.active===si){stopStory();return;}
  stopStory();
  storyPB.active=si;storyPB.idx=0;storyPB.token++;
  const b=document.getElementById('story-btn-'+si);
  if(b){b.innerHTML='&#9632; 停止';b.classList.add('playing');}
  storyNext();
}
function storyNext(){
  if(storyPB.active===null)return;
  const si=storyPB.active,st=STORIES[si];
  if(storyPB.idx>=st.lines.length){
    const fb=document.getElementById('story-btn-'+si);
    if(fb){fb.innerHTML='&#9654; 朗読スタート';fb.classList.remove('playing');}
    if(storyPB.queue&&storyPB.qpos<storyPB.queue.length-1){
      storyPB.qpos++;
      const qtok=++storyPB.token;
      setTimeout(()=>{if(storyPB.queue&&storyPB.token===qtok)startQueued();},900);
      return;
    }
    stopStory();return;
  }
  const tok=storyPB.token,li=storyPB.idx;
  document.querySelectorAll('.story-line.now').forEach(e=>e.classList.remove('now'));
  const el=document.getElementById(`sline-${si}-${li}`);
  if(el){el.classList.add('now');el.scrollIntoView({block:'center',behavior:'smooth'});}
  const u=mkStoryUtter(st.lines[li]);
  const advance=()=>{if(storyPB.active===si&&storyPB.token===tok){storyPB.idx++;setTimeout(()=>{if(storyPB.active===si&&storyPB.token===tok)storyNext();},350);}};
  u.onend=advance;u.onerror=advance;
  window.speechSynthesis.speak(u);
}
function stopStory(){
  storyPB.token++;
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  if(storyPB.active!==null){
    const b=document.getElementById('story-btn-'+storyPB.active);
    if(b){b.innerHTML='&#9654; 朗読スタート';b.classList.remove('playing');}
  }
  const ab=document.getElementById('story-all-btn');
  if(ab){ab.innerHTML='&#9654; 全話連続再生';ab.classList.remove('playing');}
  document.querySelectorAll('.story-line.now').forEach(e=>e.classList.remove('now'));
  storyPB.active=null;storyPB.idx=0;storyPB.queue=null;storyPB.qpos=0;
}
function speakStoryLine(si,li){
  stopStory();
  const line=STORIES[si].lines[li];
  const el=document.getElementById(`sline-${si}-${li}`);
  if(el)el.classList.add('now');
  const u=mkStoryUtter(line);
  u.onend=()=>{if(el)el.classList.remove('now');};
  u.onerror=()=>{if(el)el.classList.remove('now');};
  window.speechSynthesis.speak(u);
}

function filterItems(query){
  const q=query.toLowerCase().trim();
  document.querySelectorAll('[data-search]').forEach(el=>{el.style.display=!q||el.dataset.search.includes(q)?'':'none';});
  document.querySelectorAll('.ref-table tbody tr').forEach(tr=>{const text=tr.textContent.toLowerCase();tr.style.display=!q||text.includes(q)?'':'none';});
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
render();
</script>
